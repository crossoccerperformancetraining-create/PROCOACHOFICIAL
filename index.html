e-500":"text-slate-400"} /></button></div><div className="p-3 bg-white flex flex-col gap-2"><textarea className="text-xs text-slate-500 w-full h-12 resize-none outline-none border rounded p-1" value={i.desc||''} onChange={e=>setLib(ensureArray(lib).map(x=>x.libId===i.libId?{...x,desc:e.target.value}:x))} placeholder="Descrição..."/><textarea className="text-xs text-slate-500 w-full h-12 resize-none outline-none border rounded p-1" value={i.variants||''} onChange={e=>setLib(ensureArray(lib).map(x=>x.libId===i.libId?{...x,variants:e.target.value}:x))} placeholder="Variações..."/></div></div>))}</div></div> );

const SessionView = ({ drills, setDrills, header, setHeader, logo, themeColor, players, history, setHistory, sessionDate, setSessionDate, teamName }) => {

        if (pSd.current !== sessionDate) {
            if (history && history[sessionDate]) { setDrills(ensureArray(history[sessionDate].drills)); setLR(history[sessionDate].ratings || {}); } 
            else { setDrills([]); setLR({}); }
            pSd.current = sessionDate;
        } else { setLR((history && history[sessionDate] && history[sessionDate].ratings) ? history[sessionDate].ratings : {}); }
    }, [sessionDate]);
    const upD = (i, f, v) => { const n=[...ensureArray(drills)]; n[i][f]=v; setDrills(n); };
    const upI = (i) => { const u=prompt("Link Imagem:"); if(u!==null) upD(i,'image',u); };
    const upV = (i) => { const u=prompt("Link Vídeo:"); if(u!==null) upD(i,'video',u); };
    const sav = () => { try { const nH={...history, [sessionDate]:{drills:ensureArray(drills),ratings:lR,header}}; setHistory(nH); setT("Salvo!"); setTimeout(()=>setT(null), 3000); } catch(e){} };
    const sDr = ensureArray(drills); const sAv = Object.values(lR).length>0 ? (Object.values(lR).reduce((a,b)=>a+b,0)/Object.values(lR).length).toFixed(1) : 0;

                </div>
                <div className="mb-6 rounded-2xl shadow-xl text-white p-6 relative overflow-hidden print-card" style={{background: `linear-gradient(135deg, ${themeColor}, #0f172a)`}}>
                    <div className="flex items-center gap-6 relative z-10"><div className="w-20 h-20 bg-white/10 rounded-2xl flex items-center justify-center border border-white/20 overflow-hidden">{logo?<img src={logo} className="w-full h-full object-contain"/>:<Icon name="image" className="opacity-50"/>}</div><div className="flex-1"><h1 className="text-3xl font-black uppercase mb-1">{teamName || 'EQUIPE'}</h1><div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm mt-4"><div className="relative border border-white/30 rounded px-2 py-1 flex flex-col"><label className="text-[10px] opacity-70">DATA</label><span className="font-bold">{formatDateBR(sessionDate)}</span></div><div className="relative border border-white/30 rounded px-2 py-1 flex flex-col"><label className="text-[10px] opacity-70">LOCAL</label><input className="bg-transparent font-bold outline-none placeholder-white/50 w-full" placeholder="Ex: CT" value={header.local||''} onChange={e=>setHeader({...header, local: e.target.value})}/></div><div className="relative border border-white/30 rounded px-2 py-1 flex flex-col"><label className="text-[10px] opacity-70">INÍCIO</label><input type="time" className="bg-transparent font-bold outline-none w-full" value={header.time||''} onChange={e=>setHeader({...header, time: e.target.value})}/></div><div className="relative border border-white/30 rounded px-2 py-1 flex flex-col"><label className="text-[10px] opacity-70">DURAÇÃO</label><input className="bg-transparent font-bold outline-none placeholder-white/50 w-full" placeholder="Ex: 90 min" value={header.dur||''} onChange={e=>setHeader({...header, dur: e.target.value})}/></div></div></div></div>

                            <div className="flex h-64"><div className="w-1/2 bg-slate-100 flex items-center justify-center relative group/img">{drill.image ? <img src={drill.image} className="w-full h-full object-contain" /> : <div className="text-slate-400 flex flex-col items-center"><Icon name="image" size={32}/><span>Sem Imagem</span></div>}<div className="absolute inset-0 bg-black/60 flex flex-col gap-2 items-center justify-center opacity-0 group-hover/img:opacity-100 no-print"><button onClick={()=>upI(idx)} className="text-white hover:text-blue-400 bg-white/10 px-3 py-1 rounded-full flex items-center gap-1 border border-white/20"><Icon name="link" size={16}/> <span className="text-[10px] font-bold">IMAGEM</span></button><button onClick={()=>upV(idx)} className="text-white hover:text-red-400 bg-white/10 px-3 py-1 rounded-full flex items-center gap-1 border border-white/20"><Icon name="play" size={16}/> <span className="text-[10px] font-bold">VÍDEO</span></button></div></div><div className="w-1/2 p-3 flex flex-col gap-2"><textarea className="w-full h-1/2 bg-slate-50 border rounded p-2 text-xs resize-none" value={drill.desc} onChange={e=>upD(idx,'desc',e.target.value)} placeholder="Descrição..."/><textarea className="w-full h-1/2 bg-slate-50 border rounded p-2 text-xs resize-none" value={drill.variants} onChange={e=>upD(idx,'variants',e.target.value)} placeholder="Variações..."/></div></div>
                        </div>
                    )) : <div className="text-center p-8 text-slate-400 border-2 border-dashed rounded-xl">Vazio. Adicione abaixo.</div>}
                    <button onClick={()=>{setDrills([...sDr, { id: Date.now(), name: 'NOVO', method: 'Tático', dim: '-', time: '10', desc: '', variants: '', image: null, video: null }])}} className="w-full py-4 border-2 border-dashed border-slate-300 rounded-xl text-slate-400 hover:border-blue-500 font-bold flex items-center justify-center gap-2 no-print"><Icon name="plus"/> ADICIONAR EXERCÍCIO</button>
                </div>
            </div>
            <div className="w-full md:w-80 border-t md:border-t-0 md:border-l border-slate-200 bg-white flex flex-col h-64 md:h-full shadow-lg z-20 no-print"><div className="p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center"><div><div className="text-xs font-bold text-slate-400 uppercase">Nota Média</div><div className="text-2xl font-black flex items-center gap-1" style={{color: themeColor}}>{sAv} <Icon name="star" size={18} className="text-yellow-400"/></div></div><div className="text-xs font-bold text-right text-slate-400">JOGADORES<br/>DISPONÍVEIS</div></div><div className="flex-1 overflow-y-auto p-2 space-y-2 bg-slate-100">{ensureArray(players).filter(p=>!p.injured).map((p,i)=>(<div key={i} className="flex flex-col p-2 rounded border bg-white shadow-sm"><div className="flex items-center gap-2 mb-1"><div className="w-6 h-6 rounded-full bg-slate-200 overflow-hidden relative shrink-0">{p.image?<img src={p.image} className="w-full h-full object-cover"/>:<Icon name="users" size={10}/>}</div><div className="flex-1 min-w-0 font-bold text-xs text-slate-700 uppercase truncate">{p.name}</div><input type="checkbox" className="ml-auto w-4 h-4 cursor-pointer accent-green-600" defaultChecked={true}/></div><div className="flex justify-center"><StarRating value={lR[i]||0} onChange={v=>setLR({...lR, [i]:v})}/></div></div>))}</div></div>

                {tab === 'scouting' && <ScoutingView themeColor={themeColor} scoutingData={scoutingData} setScoutingData={setScoutingData} scoutingHistory={scoutingHistoryRaw} setScoutingHistory={setScoutingHistory} />}
                {tab === 'session' && <SessionView drills={sessionDrills} setDrills={setSessionDrills} header={header} setHeader={setHeader} logo={teamLogo} themeColor={themeColor} players={playersRaw} history={sessionHistory} setHistory={setSessionHistory} sessionDate={sessionDate} setSessionDate={setSessionDate} teamName={teamName} />}
                {tab === 'postmatch' && <PostMatchView themeColor={themeColor} matchData={matchData} setMatchData={setMatchData} players={playersRaw} setPlayers={setPlayers} matchHistory={matchHistoryRaw} setMatchHistory={setMatchHistory} teamLogo={teamLogo} />}
                {tab === 'micro' && <MicrocycleView micro={microData} setMicro={setMicroData} themeColor={themeColor} calendar={calendarData} />}
                {tab === 'board' && <VisualBoardView currentWeekStart={getMonday(boardWeekDate)} changeWeek={(d)=>{const n=new Date(boardWeekDate); n.setDate(n.getDate()+d); setBoardWeekDate(n);}} boardData={boardHistory[getWeekKey(boardWeekDate)]||{}} updateBoardData={(d,i)=>{const k=getWeekKey(boardWeekDate); setBoardHistory({...boardHistory, [k]:{...(boardHistory[k]||{}), [d]:i}});}} themeColor={themeColor} />}
                {tab === 'calendar' && <CalendarView calendar={calendarData} setCalendar={setCalendarData} themeColor={themeColor} notices={noticesRaw} />}
                {tab === 'library' && <LibraryView lib={libraryDrillsRaw} setLib={setLibraryDrills} onAddS={(i)=>setSessionDrills(p=>[...ensureArray(p),{...i,id:Date.now()}])} onAddB={(d,i)=>{const k=getWeekKey(boardWeekDate); setBoardHistory({...boardHistory, [k]:{...(boardHistory[k]||{}), [d]:[...ensureArray((boardHistory[k]||{})[d]), i]}});}} tC={themeColor} />}
            </div>
        </div>
    );
};

const MainControl = () => {
    const [user, setUser] = useState(null); const [loading, setLoading] = useState(true);
    useEffect(() => {
        if (!auth) { setLoading(false); const l = document.getElementById('loading'); if(l) l.style.display = 'none'; return; }
        const t = setTimeout(() => { if (loading) { setLoading(false); const l = document.getElementById('loading'); if(l) l.style.display = 'none'; } }, 5000);
        const un = auth.onAuthStateChanged(async (u) => {
            clearTimeout(t);
            if (u && db) {
                try {
                    const lt = document.getElementById('loading-text'); if(lt) lt.innerText = 'Puxando Nuvem...';
                    const doc = await db.collection('coachData').doc(u.uid).get({ source: 'default' });
                    if (doc.exists) {
                        const d = doc.data(); Object.keys(d).forEach(k => { if (k.startsWith('pc_')) { window.localStorage.setItem(k, typeof d[k] === 'string' ? d[k] : JSON.stringify(d[k])); } });
                    }
                } catch(e) {}
            }
            setUser(u); setLoading(false); const l = document.getElementById('loading'); if(l) l.style.display = 'none';
        });
        return () => un();
    }, []);

    if (loading) return null;
    if (!user && auth) return <AuthScreen />;
    return <App user={user} />;
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ErrorBoundary><MainControl /></ErrorBoundary>);
</script>
</body>

</html>
