<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProCoach Auxiliar - MAX SYNC V2106</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --navy: #020617; --gold: #d4af37; --success: #22c55e; }
        body { background-color: var(--navy); color: #f8fafc; font-family: 'Inter', sans-serif; }
        
        .nav-btn { @apply flex-none px-5 py-4 text-xs font-black text-center rounded-2xl uppercase tracking-widest transition-all bg-[#1e293b] text-slate-400 border-2 border-slate-700 flex flex-col items-center gap-1 min-w-[110px]; }
        .nav-active { @apply border-gold text-navy bg-gradient-to-br from-gold to-yellow-500 shadow-[0_10px_25px_rgba(212,175,55,0.4)] scale-105; }
        
        .star-rating button { font-size: 32px; color: #334155; transition: 0.2s; outline: none; }
        .star-rating button.active { color: #facc15; text-shadow: 0 0 15px rgba(250,204,21,0.7); }

        /* Status de Conexão igual ao Desktop */
        .status-online { @apply flex items-center gap-2 bg-green-500/10 text-green-500 px-3 py-1 rounded-full text-[10px] font-black uppercase border border-green-500/20; }
        
        #toast { visibility: hidden; min-width: 280px; background-color: var(--success); color: #fff; text-align: center; border-radius: 12px; padding: 16px; position: fixed; z-index: 999999; left: 50%; transform: translateX(-50%); top: 30px; opacity: 0; transition: 0.4s; border: 2px solid white; font-weight: 900; }
        #toast.show { visibility: visible; opacity: 1; }
    </style>
</head>
<body>

<div id="toast">⭐ SINCRONIZADO COM V2106</div>

<div class="bg-[#020617] border-b border-white/10 p-5 flex justify-between items-center sticky top-0 z-50">
    <div class="flex items-center gap-4">
        <div id="team-logo-display" class="w-12 h-12 rounded-lg bg-white/5 border border-white/10 flex items-center justify-center overflow-hidden">
            <span class="text-[10px] opacity-20">LOGO</span>
        </div>
        <div>
            <h2 id="team-name-display" class="text-white font-black italic text-xl uppercase tracking-tighter">AC SOCCER</h2>
            <div class="status-online"><span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Online</div>
        </div>
    </div>
    <div class="text-right">
        <p id="current-date" class="text-gold font-black text-xs">26 de abr. de 2026</p>
        <p class="text-slate-500 font-bold text-[10px] uppercase">Módulo Auxiliar</p>
    </div>
</div>

<div class="flex gap-3 p-4 bg-[#020617] sticky top-[85px] z-40 border-b border-white/5 overflow-x-auto no-scrollbar">
    <button onclick="showTab('sessao')" id="btn-sessao" class="nav-btn nav-active"><span>⚽</span> SESSÃO</button>
    <button onclick="showTab('dash')" id="btn-dash" class="nav-btn"><span>📊</span> INÍCIO</button>
    <button onclick="showTab('voz')" id="btn-voz" class="nav-btn"><span>🎙️</span> RELATO</button>
</div>

<div id="content" class="p-5 pb-32">
    
    <div id="tab-sessao" class="tab-view space-y-6">
        <div id="drills-header" class="bg-blue-600 rounded-2xl p-4 flex justify-between items-center shadow-lg">
            <span class="text-white font-black uppercase text-sm">Treino do Dia</span>
            <span id="sessao-timer" class="bg-black/20 text-white px-3 py-1 rounded-lg text-xs font-bold">90 min</span>
        </div>

        <div id="players-list" class="space-y-3">
            </div>

        <div id="action-area" class="pt-6 border-t border-white/10">
            <button id="btn-finalizar" onclick="finalizarESincronizar()" class="w-full py-6 bg-green-600 hover:bg-green-700 text-white font-black rounded-2xl shadow-2xl active:scale-95 transition-all uppercase tracking-widest flex justify-center items-center gap-3">
                <span id="btn-text">✅ FINALIZAR E ENVIAR NOTAS</span>
            </button>
        </div>
    </div>

    <div id="tab-dash" class="tab-view hidden space-y-4">
        <div class="bg-[#1e293b] p-6 rounded-2xl border border-white/10">
            <h3 class="text-slate-400 font-black text-xs uppercase mb-4 tracking-widest">Resumo de Performance</h3>
            <div id="mini-rank" class="space-y-2">
                </div>
        </div>
    </div>

    <div id="tab-voz" class="tab-view hidden space-y-4">
        <textarea id="voice-txt" class="w-full bg-black/50 border-2 border-white/10 rounded-3xl p-6 text-white h-60" placeholder="Relate ocorrências aqui..."></textarea>
        <button onclick="iniciarVoz()" class="w-full bg-gold text-navy font-black py-6 rounded-2xl uppercase tracking-widest">🎤 INICIAR DITADO</button>
    </div>
</div>

<script>
    // Configurações do Firebase
    const firebaseConfig = { 
        apiKey: "AIzaSyBURvWmrRe-q-l1h2XKaQepeRQoNcmi7nk", 
        authDomain: "procoachoficial.firebaseapp.com", 
        projectId: "procoachoficial", 
        storageBucket: "procoachoficial.firebasestorage.app", 
        messagingSenderId: "128403842399", 
        appId: "1:128403842399:web:c54259e2b6a5622fb942ea" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let allPlayers = [];
    const todayISO = new Date().toISOString().split('T')[0];

    // Login automático para testes (Substitua se necessário)
    auth.onAuthStateChanged(user => {
        if(user) syncData(user.uid);
        else auth.signInWithEmailAndPassword("seu-email@teste.com", "sua-senha");
    });

    function syncData(uid) {
        db.collection('coachData').doc(uid).onSnapshot(doc => {
            if(!doc.exists) return;
            const data = doc.data();
            
            // Sincroniza Nome e Logo conforme Imagem 2
            document.getElementById('team-name-display').innerText = data.pc_team_name || "AC SOCCER";
            if(data.pc_logo) document.getElementById('team-logo-display').innerHTML = `<img src="${data.pc_logo}" class="w-full h-full object-cover">`;

            // Sincroniza Plantel
            allPlayers = JSON.parse(data.pc_players || "[]");
            renderPlayers();

            // Verifica se a sessão já foi fechada hoje
            if(data.pc_training_finished === todayISO) {
                travarInterface();
            }
        });
    }

    function renderPlayers() {
        const container = document.getElementById('players-list');
        container.innerHTML = allPlayers.map((p, idx) => `
            <div class="bg-[#1e293b]/50 p-4 rounded-2xl border border-white/5 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-black text-xs text-white">
                        ${p.image ? `<img src="${p.image}" class="w-full h-full rounded-full object-cover">` : p.name.charAt(0)}
                    </div>
                    <div>
                        <p class="text-white font-black text-sm uppercase">${p.name}</p>
                        <p class="text-slate-500 font-bold text-[10px] uppercase">${p.pos || 'Atleta'}</p>
                    </div>
                </div>
                <div class="flex gap-1 star-rating" id="stars-${idx}">
                    ${[1,2,3,4,5].map(n => `<button onclick="atribuirNota(${idx}, ${n})" class="${(p.temp_rating || 0) >= n ? 'active' : ''}">★</button>`).join('')}
                </div>
            </div>
        `).join('');
    }

    function atribuirNota(pIdx, nota) {
        allPlayers[pIdx].temp_rating = nota; // Nota temporária da sessão
        renderPlayers();
    }

    async function finalizarESincronizar() {
        const uid = auth.currentUser.uid;
        document.getElementById('btn-finalizar').disabled = true;
        document.getElementById('btn-text').innerText = "SINCRONIZANDO...";

        try {
            const docRef = db.collection('coachData').doc(uid);
            const doc = await docRef.get();
            const data = doc.data();

            // 1. Atualiza as médias na aba "PERFORMA" (Imagem 3)
            let updatedPlayers = allPlayers.map(p => {
                if(p.temp_rating) {
                    p.rating = p.temp_rating; // Define a nova nota
                    p.avg = p.temp_rating;    // Atualiza a média exibida no V2106
                }
                return p;
            });

            // 2. Vincula as notas ao histórico da "SESSÃO" (Imagem 2)
            let history = JSON.parse(data.pc_history_v2 || "{}");
            if(!history[todayISO]) history[todayISO] = { drills: [], ratings: {} };
            
            allPlayers.forEach(p => {
                if(p.temp_rating) history[todayISO].ratings[p.name] = p.temp_rating;
            });

            // 3. Gravação Única no Firebase
            await docRef.update({
                pc_players: JSON.stringify(updatedPlayers),
                pc_history_v2: JSON.stringify(history),
                pc_training_finished: todayISO, // Trava a sessão
                pc_last_update: Date.now()      // Notifica o Desktop que houve mudança
            });

            mostrarToast("SESSÃO FINALIZADA E ENVIADA!");
            travarInterface();

        } catch (error) {
            console.error(error);
            alert("Erro ao sincronizar. Verifique a internet.");
            document.getElementById('btn-finalizar').disabled = false;
        }
    }

    function travarInterface() {
        document.getElementById('btn-finalizar').classList.replace('bg-green-600', 'bg-slate-700');
        document.getElementById('btn-text').innerText = "SESSÃO FINALIZADA ✅";
        document.getElementById('btn-finalizar').onclick = () => {
            if(confirm("Deseja reabrir para corrigir notas?")) {
                db.collection('coachData').doc(auth.currentUser.uid).update({ pc_training_finished: "" });
                location.reload();
            }
        };
    }

    function showTab(t) {
        document.querySelectorAll('.tab-view').forEach(v => v.classList.add('hidden'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
        document.getElementById('tab-' + t).classList.remove('hidden');
        document.getElementById('btn-' + t).classList.add('nav-active');
    }

    function mostrarToast(msg) {
        const t = document.getElementById("toast");
        t.innerText = msg; t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 3000);
    }

    function iniciarVoz() {
        const r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        r.lang = 'pt-BR';
        r.onresult = e => document.getElementById('voice-txt').value += e.results[0][0].transcript + " ";
        r.start();
    }
</script>
</body>
</html>
