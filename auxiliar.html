<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProCoach Auxiliar - V2106 Elite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --navy: #0f172a; --gold: #d4af37; --card-bg: #1e293b; }
        body { background-color: var(--navy); color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Botões do Menu com Destaque */
        .nav-btn { @apply flex-1 px-4 py-4 text-[10px] font-black text-center border-b-2 border-transparent uppercase tracking-widest transition-all text-white/40; }
        .nav-active { @apply border-gold text-gold bg-white/5 shadow-[inset_0_-10px_20px_-10px_rgba(212,175,55,0.3)]; }
        
        /* Dashboard Layout */
        .dash-card { @apply bg-[#1e293b] rounded-xl border border-white/10 shadow-2xl overflow-hidden; }
        .tag-periodo { @apply text-[8px] font-black px-2 py-0.5 rounded-full bg-white/10 text-gold mb-1 inline-block uppercase; }
        .tag-atividade { @apply px-2 py-1 rounded text-[10px] font-bold text-white uppercase shadow-lg; }
        
        /* Microciclo Vertical (Igual Imagem) */
        .micro-column { min-width: 180px; @apply bg-[#1e293b] rounded-xl border border-white/5 flex flex-col h-[480px] shadow-xl; }
        .micro-header { @apply bg-blue-900/80 p-3 text-center border-b border-gold/30 font-black text-[11px] uppercase tracking-tighter; }
        .periodo-box { @apply p-2 bg-black/20 rounded-lg border border-white/5 mb-2; }
        .grass-pitch { background-color: #15803d; background-image: repeating-linear-gradient(90deg, transparent, transparent 10%, rgba(255,255,255,0.05) 10%, rgba(255,255,255,0.05) 11%); }

        /* Estrelas */
        .star-rating button { font-size: 20px; color: #334155; }
        .star-rating button.active { color: #facc15; text-shadow: 0 0 10px rgba(250,204,21,0.5); }
        
        #loading { position: fixed; inset: 0; background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 10px; }
    </style>
</head>
<body>

<div id="loading">
    <div class="text-3xl font-black italic text-gold animate-pulse">PROCOACH AUXILIAR</div>
    <div class="text-[10px] font-bold opacity-40 uppercase tracking-[0.4em]">Sincronizando Dados...</div>
</div>

<div id="auth-screen" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-4 hidden">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-slate-900">
        <h1 class="text-2xl font-black italic text-center mb-6">PROCOACH <span class="text-blue-600">AUXILIAR</span></h1>
        <input type="email" id="email" placeholder="E-mail" class="w-full border-b-2 py-2 mb-4 outline-none focus:border-gold">
        <input type="password" id="pass" placeholder="Senha" class="w-full border-b-2 py-2 mb-6 outline-none focus:border-gold">
        <button onclick="login()" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl uppercase tracking-widest text-xs shadow-lg">Sincronizar Cloud</button>
    </div>
</div>

<div class="bg-[#0f172a] border-b border-white/10 p-4 flex justify-between items-center sticky top-0 z-50">
    <div class="flex items-center gap-3">
        <div id="logo-equipe" class="w-10 h-10 rounded-full bg-slate-800 border border-white/10 flex items-center justify-center overflow-hidden"></div>
        <h2 id="nome-equipe" class="text-white font-black italic text-lg uppercase tracking-tighter">CARREGANDO...</h2>
    </div>
    <div id="sync-dot" class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]"></div>
</div>

<div class="flex bg-[#0f172a] sticky top-[73px] z-40 border-b border-white/5 overflow-x-auto">
    <button onclick="showTab('dash')" id="btn-dash" class="nav-btn nav-active">Início</button>
    <button onclick="showTab('sessao')" id="btn-sessao" class="nav-btn">Sessão</button>
    <button onclick="showTab('micro')" id="btn-micro" class="nav-btn">Microciclo</button>
    <button onclick="showTab('voz')" id="btn-voz" class="nav-btn">Rec Voz</button>
</div>

<div id="content" class="p-3 pb-24 space-y-4">
    
    <div id="tab-dash" class="tab-view space-y-4">
        <div class="dash-card p-4">
            <h3 class="text-slate-500 text-[10px] font-black uppercase mb-4 tracking-widest flex items-center gap-2">🏆 Próximo Confronto</h3>
            <div id="next-match-ui" class="flex items-center justify-between px-2">
                <div class="text-center"><div class="w-14 h-14 bg-white/5 rounded-full border border-white/10 flex items-center justify-center italic text-[10px]">Casa</div></div>
                <div class="text-center">
                    <span class="text-2xl font-black italic block">VS</span>
                    <span id="adv-nome" class="text-[10px] font-black text-gold uppercase">Definindo...</span>
                </div>
                <div id="adv-logo" class="w-14 h-14 bg-white/5 rounded-full border border-white/10 flex items-center justify-center italic text-[10px]">Fora</div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div class="dash-card p-4">
                <h3 class="text-slate-500 text-[10px] font-black uppercase mb-4 tracking-widest">📅 Agenda (24/04)</h3>
                <div id="agenda-dia" class="space-y-3"></div>
            </div>
            <div class="dash-card p-4 border-l-4 border-yellow-500">
                <h3 class="text-yellow-500 text-[10px] font-black uppercase mb-4 tracking-widest">📋 Quadro de Avisos</h3>
                <div id="avisos-dia" class="space-y-2 text-xs font-medium text-white/80 italic"></div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-2">
            <div class="dash-card p-3 border-b-2 border-gold"><h4 class="text-[9px] font-black text-slate-500 uppercase mb-2 text-center">Gols</h4><div id="lista-gols" class="text-[10px] font-bold text-center"></div></div>
            <div class="dash-card p-3 border-b-2 border-red-500"><h4 class="text-[9px] font-black text-red-500 uppercase mb-2 text-center">DM</h4><div id="lista-dm" class="text-[10px] font-bold text-red-400 text-center"></div></div>
            <div class="dash-card p-3 border-b-2 border-yellow-500"><h4 class="text-[9px] font-black text-yellow-500 uppercase mb-2 text-center">Susp</h4><div id="lista-susp" class="text-[10px] font-bold text-yellow-400 text-center"></div></div>
        </div>
    </div>

    <div id="tab-sessao" class="tab-view hidden space-y-4">
        <div id="header-sessao" class="bg-blue-900/40 p-5 rounded-2xl border border-white/10 shadow-2xl">
            <h1 id="team-name-sessao" class="text-2xl font-black uppercase mb-4 italic tracking-tighter">AC SOCCER</h1>
            <div class="grid grid-cols-3 gap-2 text-center">
                <div class="bg-black/30 p-2 rounded-lg"><span class="text-[8px] block opacity-40">DATA</span><b class="text-[10px]">24/04</b></div>
                <div class="bg-black/30 p-2 rounded-lg"><span class="text-[8px] block opacity-40">LOCAL</span><b id="sessao-local" class="text-[10px]">CT</b></div>
                <div class="bg-black/30 p-2 rounded-lg"><span class="text-[8px] block opacity-40">DURAÇÃO</span><b id="sessao-dur" class="text-[10px]">90 min</b></div>
            </div>
        </div>
        <div id="exercicios-lista" class="space-y-4"></div>
        <div class="dash-card p-4">
            <h3 class="text-gold text-[10px] font-black uppercase mb-4 text-center tracking-[0.2em]">Avaliação de Atletas</h3>
            <div id="avaliar-atletas" class="space-y-2"></div>
        </div>
    </div>

    <div id="tab-micro" class="tab-view hidden overflow-x-auto pb-6 no-scrollbar">
        <div id="micro-flex" class="flex gap-4 min-w-max"></div>
    </div>

    <div id="tab-voz" class="tab-view hidden space-y-4">
        <div class="dash-card p-5">
            <h3 class="text-gold text-[10px] font-black uppercase mb-4 tracking-widest text-center">Relatar Ocorrência de Campo</h3>
            <textarea id="texto-voz" class="w-full bg-black/20 text-sm h-48 outline-none border border-white/5 rounded-xl p-4 italic" placeholder="O auxiliar dita aqui problemas ou observações..."></textarea>
        </div>
        <button onclick="iniciarVoz()" class="w-full bg-gold text-navy font-black py-5 rounded-2xl shadow-xl flex justify-center items-center gap-2 active:scale-95 transition-all">🎤 GRAVAR AGORA</button>
        <button onclick="enviarVoz()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl text-[10px] uppercase mt-2">Salvar na Nuvem</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBURvWmrRe-q-l1h2XKaQepeRQoNcmi7nk", authDomain: "procoachoficial.firebaseapp.com", projectId: "procoachoficial", storageBucket: "procoachoficial.firebasestorage.app", messagingSenderId: "128403842399", appId: "1:128403842399:web:c54259e2b6a5622fb942ea" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function login() {
        firebase.auth().signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value);
    }

    firebase.auth().onAuthStateChanged(user => {
        if (user) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'none';
            conectar(user.uid);
        } else {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'flex';
        }
    });

    function conectar(uid) {
        db.collection('coachData').doc(uid).onSnapshot(doc => {
            if (!doc.exists) return;
            const data = doc.data();
            const ISO = new Date().toISOString().split('T')[0];
            const diaSemana = ['DOMINGO','SEGUNDA','TERÇA','QUARTA','QUINTA','SEXTA','SÁBADO'][new Date().getDay()];

            // Nome Equipe
            if(data.pc_team_name) {
                document.getElementById('nome-equipe').innerText = data.pc_team_name;
                document.getElementById('team-name-sessao').innerText = data.pc_team_name;
            }
            if(data.pc_team_logo_url) document.getElementById('logo-equipe').innerHTML = `<img src="${data.pc_team_logo_url}" class="w-full h-full object-contain">`;

            // Agenda Dashboard
            const micro = JSON.parse(data.pc_micro_v7 || "{}");
            const agendaHoje = micro[diaSemana]?.blocks || [];
            document.getElementById('agenda-dia').innerHTML = agendaHoje.map(b => `
                <div class="flex items-center gap-2"><span class="tag-periodo">${b.period === 'M' ? 'M' : 'T'}</span><span class="tag-atividade ${b.color}">${b.label}</span></div>
            `).join('') || '<p class="opacity-20 text-xs italic">Nenhum treino agendado.</p>';

            // Quadro de Avisos
            const avisos = JSON.parse(data.pc_notices_list || "[]");
            document.getElementById('avisos-dia').innerHTML = avisos.slice(0,3).map(n => `<p>• ${n.text}</p>`).join('') || 'Sem avisos.';

            // Microciclo Vertical (Igual Imagem)
            const dias = ["SEGUNDA", "TERÇA", "QUARTA", "QUINTA", "SEXTA", "SÁBADO", "DOMINGO"];
            document.getElementById('micro-flex').innerHTML = dias.map(d => `
                <div class="micro-column">
                    <div class="micro-header">${d}</div>
                    <div class="p-3 flex-1">
                        <div class="periodo-box"><span class="tag-periodo">Manhã</span><div class="space-y-1">${(micro[d]?.blocks || []).filter(x=>x.period==='M').map(x=>`<div class="tag-atividade ${x.color} w-full block text-center">${x.label}</div>`).join('')}</div></div>
                        <div class="periodo-box"><span class="tag-periodo">Tarde</span><div class="space-y-1">${(micro[d]?.blocks || []).filter(x=>x.period==='T').map(x=>`<div class="tag-atividade ${x.color} w-full block text-center">${x.label}</div>`).join('')}</div></div>
                    </div>
                    <div class="p-2 grass-pitch h-24 rounded-b flex items-center justify-center opacity-40">
                        <svg class="w-full h-full p-2" viewBox="0 0 100 140" fill="none" stroke="white" stroke-width="1.5"><rect x="5" y="5" width="90" height="130"/><line x1="5" y1="70" x2="95" y2="70"/></svg>
                    </div>
                </div>
            `).join('');

            // Atletas Gols/DM
            const players = JSON.parse(data.pc_players || "[]");
            document.getElementById('lista-gols').innerHTML = players.sort((a,b)=>(b.stats?.g||0)-(a.stats?.g||0)).slice(0,2).map(p=>`<div>${p.name}: ${p.stats?.g||0}</div>`).join('');
            document.getElementById('lista-dm').innerHTML = players.filter(p=>p.injured).slice(0,2).map(p=>`<div>${p.name}</div>`).join('') || 'Livre';
            document.getElementById('lista-susp').innerHTML = players.filter(p=>p.suspended).slice(0,2).map(p=>`<div>${p.name}</div>`).join('') || 'Livre';

            // Notas Pós Treino
            document.getElementById('avaliar-atletas').innerHTML = players.filter(p=>!p.injured).map((p,i) => `
                <div class="flex items-center justify-between p-3 bg-black/20 rounded-xl border border-white/5">
                    <div class="flex items-center gap-3">
                        <img src="${p.image || ''}" class="w-8 h-8 rounded-full border border-white/10">
                        <span class="text-[10px] font-black uppercase truncate w-24">${p.name}</span>
                    </div>
                    <div class="flex gap-1 star-rating">
                        ${[1,2,3,4,5].map(n => `<button onclick="votar(${i}, ${n})" class="${(p.rating||0) >= n ? 'active' : ''}">★</button>`).join('')}
                    </div>
                </div>
            `).join('');

            // Sessão do Dia
            const hist = JSON.parse(data.pc_history_v2 || "{}");
            const sessao = hist[ISO]?.drills || [];
            document.getElementById('exercicios-lista').innerHTML = sessao.map((ex,i) => `
                <div class="dash-card">
                    <div class="bg-blue-900/30 p-3 flex justify-between border-b border-white/5">
                        <span class="text-[10px] font-black text-gold uppercase">${i+1}. ${ex.name}</span>
                        <span class="text-[9px] font-bold opacity-40 uppercase">${ex.time} min</span>
                    </div>
                    <img src="${ex.image || ''}" class="w-full h-44 object-contain bg-black/40">
                </div>
            `).join('') || '<div class="text-center py-10 opacity-20 text-xs italic">Nenhum exercício carregado.</div>';
        });
    }

    function votar(idx, nota) {
        const uid = firebase.auth().currentUser.uid;
        db.collection('coachData').doc(uid).get().then(doc => {
            const p = JSON.parse(doc.data().pc_players);
            p[idx].rating = nota;
            db.collection('coachData').doc(uid).update({ pc_players: JSON.stringify(p) });
        });
    }

    function showTab(t) {
        document.querySelectorAll('.tab-view').forEach(v => v.classList.add('hidden'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
        document.getElementById('tab-' + t).classList.remove('hidden');
        document.getElementById('btn-' + t).classList.add('nav-active');
    }

    function iniciarVoz() {
        const r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        r.lang = 'pt-BR';
        r.onresult = e => document.getElementById('texto-voz').value += e.results[0][0].transcript + " ";
        r.start();
    }

    function enviarVoz() {
        const txt = document.getElementById('texto-voz').value;
        if(!txt) return;
        const uid = firebase.auth().currentUser.uid;
        db.collection('coachData').doc(uid).get().then(doc => {
            let list = JSON.parse(doc.data().pc_notices_list || "[]");
            list.unshift({ id: Date.now(), date: new Date().toISOString().split('T')[0], text: "[VOZ]: " + txt });
            db.collection('coachData').doc(uid).update({ pc_notices_list: JSON.stringify(list) });
            alert("Aviso enviado para o Dashboard!"); document.getElementById('texto-voz').value = '';
        });
    }
</script>
</body>
</html>
