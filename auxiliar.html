<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProCoach Auxiliar - V2106 Elite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --navy: #0f172a; --gold: #d4af37; --card: #1e293b; }
        body { background-color: var(--navy); color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Menu Separado e Organizado */
        .nav-container { @apply flex bg-[#0f172a]/95 backdrop-blur-md sticky top-[80px] z-40 border-b border-white/5 overflow-x-auto; scrollbar-width: none; }
        .nav-btn { @apply flex-1 px-5 py-4 text-[10px] font-black text-center border-b-2 border-transparent uppercase tracking-widest transition-all whitespace-nowrap text-white/40; }
        .nav-active { @apply border-gold text-gold bg-white/5; }
        
        /* Cards e Estilos */
        .dashboard-card { @apply bg-[#1e293b] rounded-xl border border-white/5 shadow-2xl overflow-hidden; }
        .tag { @apply px-2 py-0.5 rounded text-[9px] font-bold text-white uppercase inline-block shadow-sm; }
        .sessao-header { background: linear-gradient(135deg, #1e3a8a, #0f172a); border-radius: 12px; }
        .star-rating button { font-size: 18px; color: #334155; }
        .star-rating button.active { color: #facc15; }
        
        #loading { position: fixed; inset: 0; background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 10px; }
    </style>
</head>
<body>

<div id="loading">
    <div class="text-3xl font-black italic text-gold">PROCOACH AUXILIAR</div>
    <div class="text-[10px] font-bold opacity-50 uppercase tracking-[0.3em]">Sincronizando Nuvem...</div>
</div>

<div id="auth-screen" class="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-4 hidden">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-slate-800">
        <div class="text-center mb-8"><h1 class="text-2xl font-black italic">PROCOACH</h1><span class="text-[10px] font-bold text-white bg-blue-600 px-2 py-0.5 rounded uppercase">Acesso Comissão</span></div>
        <input type="email" id="email" placeholder="E-mail" class="w-full border-b-2 py-2 mb-4 outline-none">
        <input type="password" id="pass" placeholder="Senha" class="w-full border-b-2 py-2 mb-6 outline-none">
        <button onclick="login()" class="w-full bg-slate-900 text-white font-black py-3 rounded-lg uppercase tracking-widest text-xs">Entrar no Campo</button>
    </div>
</div>

<div class="bg-[#0f172a] border-b border-white/10 p-4 flex justify-between items-center sticky top-0 z-50">
    <div class="flex items-center gap-4">
        <div id="team-logo-display" class="w-12 h-12 rounded-full bg-slate-800 border border-white/10 flex items-center justify-center overflow-hidden"></div>
        <div>
            <h2 id="team-name-display" class="text-white font-black italic text-xl leading-none uppercase tracking-tighter">AC SOCCER</h2>
            <select class="bg-transparent text-[9px] font-black text-gold uppercase mt-1 outline-none border-0">
                <option>AUXILIAR TÉCNICO</option>
                <option>PREP. FÍSICO</option>
                <option>FISIOTERAPEUTA</option>
            </select>
        </div>
    </div>
    <div class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]"></div>
</div>

<div class="nav-container">
    <button onclick="showTab('dash')" id="btn-dash" class="nav-btn nav-active">Dashboard</button>
    <button onclick="showTab('sessao')" id="btn-sessao" class="nav-btn">Sessão</button>
    <button onclick="showTab('micro')" id="btn-micro" class="nav-btn">Microciclo</button>
    <button onclick="showTab('ocorrencia')" id="btn-ocorrencia" class="nav-btn">Relato Voz</button>
</div>

<div id="content" class="p-3 pb-24 space-y-4">
    
    <div id="tab-dash" class="tab-view space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div class="dashboard-card p-4 flex flex-col items-center">
                <h3 class="w-full text-slate-500 text-[9px] font-black uppercase mb-4 tracking-widest">🏆 Próximo Jogo</h3>
                <div id="adversario-display" class="flex items-center gap-6 py-2">
                    <div id="escudo-adversario" class="w-16 h-16 bg-white/5 rounded-full border border-white/10 flex items-center justify-center overflow-hidden">
                        <span class="text-[10px] opacity-20 italic">ESCUDO</span>
                    </div>
                    <div class="text-center">
                        <span class="text-2xl font-black italic block uppercase" id="nome-adversario">ADVERSÁRIO</span>
                        <span class="text-[10px] font-bold text-gold uppercase tracking-tighter" id="data-jogo">A DEFINIR</span>
                    </div>
                </div>
            </div>
            <div class="dashboard-card p-4">
                <h3 class="text-slate-500 text-[9px] font-black uppercase mb-3 tracking-widest">📅 Agenda do Dia</h3>
                <div id="agenda-hoje" class="space-y-2"></div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-2">
            <div class="dashboard-card p-3 border-b-2 border-gold"><h4 class="text-[9px] font-black text-slate-500 uppercase mb-2">⚽ Gols</h4><div id="gols-lista" class="text-[10px] font-bold"></div></div>
            <div class="dashboard-card p-3 border-b-2 border-red-500"><h4 class="text-[9px] font-black text-red-500 uppercase mb-2">🏥 DM</h4><div id="dm-lista" class="text-[10px] font-bold text-red-400"></div></div>
            <div class="dashboard-card p-3 border-b-2 border-yellow-500"><h4 class="text-[9px] font-black text-yellow-500 uppercase mb-2">⚠️ Susp</h4><div id="susp-lista" class="text-[10px] font-bold text-yellow-400"></div></div>
        </div>
    </div>

    <div id="tab-sessao" class="tab-view hidden space-y-4">
        <div class="sessao-header p-5 text-white shadow-xl">
            <h1 id="team-sessao" class="text-2xl font-black uppercase mb-4 tracking-tighter">AC SOCCER</h1>
            <div class="grid grid-cols-3 gap-2">
                <div class="bg-white/10 p-2 rounded-lg"><span class="text-[8px] block opacity-50">DATA</span><b id="data-sessao" class="text-[10px]">24/04</b></div>
                <div class="bg-white/10 p-2 rounded-lg"><span class="text-[8px] block opacity-50">LOCAL</span><b id="local-sessao" class="text-[10px]">CT</b></div>
                <div class="bg-white/10 p-2 rounded-lg"><span class="text-[8px] block opacity-50">DURAÇÃO</span><b id="duracao-sessao" class="text-[10px]">90 min</b></div>
            </div>
        </div>

        <div id="drills-container" class="space-y-4"></div>

        <div class="dashboard-card p-4">
            <h3 class="text-gold text-[10px] font-black uppercase mb-4 border-b border-white/5 pb-2">Avaliação de Performance</h3>
            <div id="players-rating-list" class="space-y-3"></div>
        </div>
    </div>

    <div id="tab-micro" class="tab-view hidden overflow-x-auto pb-4">
        <div id="micro-grid" class="flex gap-3 min-w-max"></div>
    </div>

    <div id="tab-ocorrencia" class="tab-view hidden space-y-4">
        <div class="dashboard-card p-4">
            <h3 class="text-gold text-[10px] font-black uppercase mb-4 tracking-widest">Relato Operacional (Voz)</h3>
            <textarea id="voice-txt" class="w-full bg-transparent text-sm h-40 outline-none border-0 italic" placeholder="O auxiliar dita aqui problemas, lesões ou observações do treino..."></textarea>
        </div>
        <button onclick="startVoice()" class="w-full bg-gold text-navy font-black py-5 rounded-xl shadow-lg active:scale-95 transition-all">🎤 INICIAR GRAVAÇÃO</button>
        <button onclick="salvarVoz()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl text-[10px] uppercase tracking-widest mt-2">Sincronizar Cloud</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBURvWmrRe-q-l1h2XKaQepeRQoNcmi7nk", authDomain: "procoachoficial.firebaseapp.com", projectId: "procoachoficial", storageBucket: "procoachoficial.firebasestorage.app", messagingSenderId: "128403842399", appId: "1:128403842399:web:c54259e2b6a5622fb942ea" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    function login() {
        auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value);
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'none';
            sync(user.uid);
        } else {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'flex';
        }
    });

    function sync(uid) {
        db.collection('coachData').doc(uid).onSnapshot(doc => {
            if (!doc.exists) return;
            const data = doc.data();
            const todayISO = new Date().toISOString().split('T')[0];
            const todayName = ['DOMINGO','SEGUNDA','TERÇA','QUARTA','QUINTA','SEXTA','SÁBADO'][new Date().getDay()];

            // Nome e Logo
            if(data.pc_team_name) {
                document.getElementById('team-name-display').innerText = data.pc_team_name;
                document.getElementById('team-sessao').innerText = data.pc_team_name;
            }
            if(data.pc_team_logo_url) document.getElementById('team-logo-display').innerHTML = `<img src="${data.pc_team_logo_url}" class="w-full h-full object-contain">`;

            // Próximo Jogo
            if(data.pc_scouting) {
                const s = JSON.parse(data.pc_scouting);
                if(s.opponent) {
                    document.getElementById('nome-adversario').innerText = s.opponent;
                    document.getElementById('data-jogo').innerText = s.date || "A definir";
                    if(s.logo) document.getElementById('escudo-adversario').innerHTML = `<img src="${s.logo}" class="w-full h-full object-contain">`;
                }
            }

            // Agenda do Dia
            const micro = JSON.parse(data.pc_micro_v7 || "{}");
            const blocosHoje = micro[todayName]?.blocks || [];
            document.getElementById('agenda-hoje').innerHTML = blocosHoje.map(b => `
                <div class="flex items-center gap-2"><span class="text-[8px] font-black opacity-30 w-8">${b.period}</span><span class="tag ${b.color}">${b.label}</span></div>
            `).join('') || '<p class="opacity-20 text-[10px] italic">Sem atividades.</p>';

            // Sessão (Drills)
            const history = JSON.parse(data.pc_history_v2 || "{}");
            const header = JSON.parse(data.pc_header || "{}");
            const sessao = history[todayISO]?.drills || [];
            
            document.getElementById('data-sessao').innerText = todayISO.split('-').reverse().slice(0,2).join('/');
            document.getElementById('local-sessao').innerText = header.local || "CT";
            document.getElementById('duracao-sessao').innerText = header.dur || "90 min";

            document.getElementById('drills-container').innerHTML = sessao.map((d,i) => `
                <div class="dashboard-card">
                    <div class="bg-blue-900/50 p-3 flex justify-between border-b border-white/5">
                        <span class="text-[10px] font-black text-gold uppercase">${i+1}. ${d.name}</span>
                        <span class="text-[9px] font-bold opacity-40 uppercase">${d.method} | ${d.time}'</span>
                    </div>
                    <img src="${d.image || ''}" class="w-full h-44 object-contain bg-black/40">
                    <div class="p-3 text-[10px] text-white/50 italic border-t border-white/5">${d.desc || ''}</div>
                </div>
            `).join('');

            // Notas Atletas
            const players = JSON.parse(data.pc_players || "[]");
            document.getElementById('players-rating-list').innerHTML = players.filter(p=>!p.injured).map((p,i) => `
                <div class="flex items-center justify-between p-2 bg-black/10 rounded-lg border border-white/5">
                    <div class="flex items-center gap-2">
                        <img src="${p.image || ''}" class="w-7 h-7 rounded-full border border-white/10">
                        <span class="text-[10px] font-black uppercase truncate w-20">${p.name}</span>
                    </div>
                    <div class="flex gap-1 star-rating">
                        ${[1,2,3,4,5].map(n => `<button onclick="votar(${i}, ${n})" class="${(p.rating||0) >= n ? 'active' : ''}">★</button>`).join('')}
                    </div>
                </div>
            `).join('');

            // Microciclo (Padrão Elite)
            const dias = ["SEGUNDA", "TERÇA", "QUARTA", "QUINTA", "SEXTA", "SÁBADO", "DOMINGO"];
            document.getElementById('micro-grid').innerHTML = dias.map(dia => `
                <div class="min-w-[160px] bg-[#1e293b] rounded-xl border border-white/10 flex flex-col h-[350px]">
                    <div class="bg-blue-900 text-white font-black text-[9px] p-3 text-center border-b border-gold/30 uppercase">${dia}</div>
                    <div class="p-2 space-y-1 flex-1">
                        ${(micro[dia]?.blocks || []).map(b => `<div class="tag ${b.color} text-center w-full block py-1.5 shadow-md">${b.label}</span></div>`).join('')}
                    </div>
                    <div class="p-2 bg-black/20 h-20 rounded-b flex items-center justify-center opacity-40">
                        <svg class="w-full h-full p-2 opacity-50" viewBox="0 0 100 140" fill="none" stroke="white" stroke-width="1.5"><rect x="5" y="5" width="90" height="130"/><line x1="5" y1="70" x2="95" y2="70"/><circle cx="50" cy="70" r="10"/></svg>
                    </div>
                </div>
            `).join('');

            // Gols/DM/Susp
            document.getElementById('gols-lista').innerHTML = players.sort((a,b)=> (b.stats?.g||0)-(a.stats?.g||0)).slice(0,3).map(p=>`<div>${p.name}: ${p.stats?.g||0}</div>`).join('');
            document.getElementById('dm-lista').innerHTML = players.filter(p=>p.injured).map(p=>`<div>• ${p.name}</div>`).join('') || 'Livre';
            document.getElementById('susp-lista').innerHTML = players.filter(p=>p.suspended).map(p=>`<div>• ${p.name}</div>`).join('') || 'Livre';
            const avisos = JSON.parse(data.pc_notices_list || "[]");
            document.getElementById('avisos-lista').innerHTML = avisos.slice(0,3).map(n=>`<div>• ${n.text}</div>`).join('');
        });
    }

    function votar(idx, nota) {
        const uid = auth.currentUser.uid;
        db.collection('coachData').doc(uid).get().then(doc => {
            const p = JSON.parse(doc.data().pc_players);
            p[idx].rating = nota;
            db.collection('coachData').doc(uid).update({ pc_players: JSON.stringify(p) });
        });
    }

    function showTab(t) {
        document.querySelectorAll('.tab-view').forEach(v => v.classList.add('hidden'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
        document.getElementById('tab-' + t).classList.remove('hidden');
        document.getElementById('btn-' + t).classList.add('nav-active');
    }

    function startVoice() {
        const r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        r.lang = 'pt-BR';
        r.onresult = e => document.getElementById('voice-txt').value += e.results[0][0].transcript + " ";
        r.start();
    }

    function salvarVoz() {
        const txt = document.getElementById('voice-txt').value;
        const uid = auth.currentUser.uid;
        db.collection('coachData').doc(uid).get().then(doc => {
            let list = JSON.parse(doc.data().pc_notices_list || "[]");
            list.unshift({ id: Date.now(), date: new Date().toISOString().split('T')[0], text: "[AUXILIAR]: " + txt });
            db.collection('coachData').doc(uid).update({ pc_notices_list: JSON.stringify(list) });
            alert("Sincronizado!"); document.getElementById('voice-txt').value = '';
        });
    }
</script>
</body>
</html>
