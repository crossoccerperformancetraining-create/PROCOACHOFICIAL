<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProCoach Auxiliar - V2106 Sync</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --navy: #0f172a; --gold: #d4af37; }
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .nav-btn { @apply px-4 py-4 text-[10px] font-black text-center border-b-2 border-transparent uppercase tracking-widest transition-all whitespace-nowrap; }
        .nav-active { @apply border-gold text-gold bg-white/5; }
        .dashboard-card { @apply bg-[#1e293b] rounded-xl border border-white/5 shadow-2xl; }
        .tag { @apply px-2 py-0.5 rounded text-[9px] font-bold text-white uppercase inline-block; }
        .star-rating button { font-size: 18px; color: #334155; }
        .star-rating button.active { color: #facc15; }
        #loading { position: fixed; inset: 0; background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div id="loading">
    <div class="text-3xl font-black italic text-gold">PROCOACH AUXILIAR</div>
    <div class="text-sm opacity-70 italic uppercase tracking-tighter">Sincronizando Nuvem...</div>
</div>

<div id="auth-screen" class="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-4 hidden">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-slate-800">
        <div class="text-center mb-8"><h1 class="text-2xl font-black italic">PROCOACH</h1><span class="text-[10px] font-bold text-white bg-blue-600 px-2 py-0.5 rounded uppercase">Módulo Comissão</span></div>
        <input type="email" id="email" placeholder="E-mail" class="w-full border-b-2 py-2 mb-4 outline-none">
        <input type="password" id="pass" placeholder="Senha" class="w-full border-b-2 py-2 mb-6 outline-none">
        <button onclick="login()" class="w-full bg-slate-900 text-white font-black py-3 rounded-lg">SINCRONIZAR</button>
    </div>
</div>

<div class="bg-[#0f172a] border-b border-white/10 p-4 flex justify-between items-center sticky top-0 z-50">
    <div class="flex items-center gap-4">
        <div id="team-logo-display" class="w-12 h-12 rounded-full bg-slate-800 border border-white/10 flex items-center justify-center overflow-hidden">
            <span class="text-[10px] italic opacity-20">LOGO</span>
        </div>
        <div>
            <h2 id="team-name-display" class="text-white font-black italic text-xl leading-none uppercase tracking-tighter">MINHA EQUIPE</h2>
            <div class="flex items-center gap-2 mt-1">
                <select id="role-select" class="bg-transparent text-[9px] font-bold text-gold uppercase outline-none border-0">
                    <option value="AUXILIAR">Auxiliar Técnico</option>
                    <option value="PREPARADOR">Prep. Físico</option>
                    <option value="GOLEIRO">Prep. Goleiro</option>
                    <option value="ROUPEIRO">Roupeiro</option>
                    <option value="MASSAGISTA">Massagista</option>
                    <option value="FISIO">Fisioterapeuta</option>
                </select>
                <span class="w-1 h-1 rounded-full bg-white/20"></span>
                <span class="text-[9px] text-white/40 uppercase font-black">V2106 Cloud</span>
            </div>
        </div>
    </div>
    <div class="flex items-center gap-2">
        <span class="text-[9px] font-black text-green-500 uppercase tracking-widest">Online</span>
        <div class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]"></div>
    </div>
</div>

<div class="flex bg-[#0f172a]/95 backdrop-blur-md sticky top-[80px] z-40 border-b border-white/5 overflow-x-auto no-scrollbar">
    <button onclick="showTab('dash')" id="btn-dash" class="nav-btn nav-active">Início</button>
    <button onclick="showTab('sessao')" id="btn-sessao" class="nav-btn">Sessão</button>
    <button onclick="showTab('micro')" id="btn-micro" class="nav-btn">Micro</button>
    <button onclick="showTab('ocorrencia')" id="btn-ocorrencia" class="nav-btn">Voz</button>
</div>

<div id="content" class="p-3 pb-24">
    <div id="tab-dash" class="tab-view space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div class="dashboard-card p-4">
                <h3 class="text-slate-400 text-[10px] font-bold uppercase mb-4 flex items-center gap-2">🏆 Próximo Jogo</h3>
                <div id="next-match-display" class="flex flex-col items-center justify-center py-4 space-y-2">
                    <span class="text-xs opacity-30 italic">Nenhum adversário definido.</span>
                </div>
            </div>
            <div class="dashboard-card p-4">
                <h3 class="text-slate-400 text-[10px] font-bold uppercase mb-4">📅 Agenda (24/04)</h3>
                <div id="agenda-hoje" class="space-y-2"></div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-2">
            <div class="dashboard-card p-3"><h4 class="text-[9px] font-bold text-slate-500 uppercase mb-2">⚽ Gols</h4><div id="gols-lista" class="text-[10px] font-black text-gold"></div></div>
            <div class="dashboard-card p-3 border-l-2 border-red-500"><h4 class="text-[9px] font-bold text-red-500 uppercase mb-2">🏥 DM</h4><div id="dm-lista" class="text-[10px] font-bold text-red-400"></div></div>
            <div class="dashboard-card p-3 border-l-2 border-yellow-500"><h4 class="text-[9px] font-bold text-yellow-500 uppercase mb-2">⚠️ Susp</h4><div id="susp-lista" class="text-[10px] font-bold text-yellow-400"></div></div>
        </div>

        <div class="dashboard-card p-4">
            <h3 class="text-slate-400 text-[10px] font-bold uppercase mb-3">📋 Quadro de Avisos</h3>
            <div id="avisos-lista" class="bg-yellow-500/5 p-3 rounded border border-yellow-500/10 text-xs space-y-2 italic"></div>
        </div>
    </div>

    <div id="tab-sessao" class="tab-view hidden space-y-4">
        <div id="drills-container" class="space-y-4"></div>
        <div class="dashboard-card p-4">
            <h3 class="text-gold text-[10px] font-black uppercase mb-4">Performance do Treino</h3>
            <div id="players-rating-list" class="space-y-2"></div>
        </div>
    </div>

    <div id="tab-micro" class="tab-view hidden overflow-x-auto pb-4">
        <div id="micro-grid" class="flex gap-4 min-w-max"></div>
    </div>

    <div id="tab-ocorrencia" class="tab-view hidden space-y-4">
        <div class="dashboard-card p-4">
            <h3 class="text-gold text-[10px] font-black uppercase mb-4">Relato por Voz</h3>
            <textarea id="voice-txt" class="w-full bg-transparent text-sm h-48 outline-none border-0" placeholder="Fale as observações..."></textarea>
        </div>
        <button onclick="startVoice()" class="w-full bg-gold text-navy font-black py-5 rounded-full">🎤 GRAVAR ÁUDIO</button>
        <button onclick="salvarVoz()" class="w-full bg-green-600 text-white font-bold py-3 rounded-xl text-xs uppercase">Sincronizar Cloud</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBURvWmrRe-q-l1h2XKaQepeRQoNcmi7nk", authDomain: "procoachoficial.firebaseapp.com", projectId: "procoachoficial", storageBucket: "procoachoficial.firebasestorage.app", messagingSenderId: "128403842399", appId: "1:128403842399:web:c54259e2b6a5622fb942ea" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    function login() {
        auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value);
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'none';
            sync(user.uid);
        } else {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'flex';
        }
    });

    function sync(uid) {
        db.collection('coachData').doc(uid).onSnapshot(doc => {
            if (!doc.exists) return;
            const data = doc.data();
            const todayISO = new Date().toISOString().split('T')[0];
            const todayName = ['DOMINGO','SEGUNDA','TERÇA','QUARTA','QUINTA','SEXTA','SÁBADO'][new Date().getDay()];

            // Cabeçalho
            if(data.pc_team_name) document.getElementById('team-name-display').innerText = data.pc_team_name;
            if(data.pc_team_logo_url) document.getElementById('team-logo-display').innerHTML = `<img src="${data.pc_team_logo_url}" class="w-full h-full object-contain">`;

            // Agenda do Dia
            const micro = JSON.parse(data.pc_micro_v7 || "{}");
            const blocosHoje = micro[todayName]?.blocks || [];
            document.getElementById('agenda-hoje').innerHTML = blocosHoje.map(b => `
                <div class="flex items-center gap-2"><span class="text-[8px] opacity-40 w-8">${b.period}</span><span class="tag ${b.color}">${b.label}</span></div>
            `).join('') || '<p class="opacity-20 text-[10px]">Folga.</p>';

            // Próximo Jogo
            if(data.pc_scouting) {
                const s = JSON.parse(data.pc_scouting);
                if(s.opponent) {
                    document.getElementById('next-match-display').innerHTML = `
                        <div class="flex items-center gap-4">
                            <span class="text-xs font-black uppercase text-gold">Nós</span>
                            <span class="text-2xl font-black italic">VS</span>
                            <span class="text-xs font-black uppercase text-white">${s.opponent}</span>
                        </div>
                        <div class="text-[9px] font-bold opacity-50 uppercase tracking-widest">${s.date || ''} | ${s.system || ''}</div>
                    `;
                }
            }

            // Gols/DM/Susp
            const players = JSON.parse(data.pc_players || "[]");
            document.getElementById('gols-lista').innerHTML = players.sort((a,b)=> (b.stats?.g||0)-(a.stats?.g||0)).slice(0,3).map(p=>`<div>${p.name}: ${p.stats?.g||0}</div>`).join('');
            document.getElementById('dm-lista').innerHTML = players.filter(p=>p.injured).map(p=>`<div>• ${p.name}</div>`).join('') || 'Vazio';
            document.getElementById('susp-lista').innerHTML = players.filter(p=>p.suspended).map(p=>`<div>• ${p.name}</div>`).join('') || 'Vazio';

            // Sessão e Notas
            const history = JSON.parse(data.pc_history_v2 || "{}");
            const sessao = history[todayISO]?.drills || [];
            document.getElementById('drills-container').innerHTML = sessao.map((d,i) => `
                <div class="dashboard-card overflow-hidden">
                    <div class="bg-blue-900/50 p-3 flex justify-between border-b border-white/5">
                        <span class="text-[10px] font-black text-gold uppercase">${i+1}. ${d.name}</span>
                        <span class="text-[9px] font-bold opacity-40 uppercase">${d.method}</span>
                    </div>
                    <img src="${d.image || ''}" class="w-full h-40 object-contain bg-black/20">
                </div>
            `).join('');

            document.getElementById('players-rating-list').innerHTML = players.filter(p=>!p.injured).map((p,i) => `
                <div class="flex items-center justify-between p-2 border-b border-white/5 last:border-0">
                    <div class="flex items-center gap-2">
                        <img src="${p.image || ''}" class="w-6 h-6 rounded-full border border-white/10">
                        <span class="text-[10px] font-bold uppercase truncate w-24">${p.name}</span>
                    </div>
                    <div class="flex gap-1 star-rating">
                        ${[1,2,3,4,5].map(n => `<button onclick="votar(${i}, ${n})" class="${(p.rating||0) >= n ? 'active' : ''}">★</button>`).join('')}
                    </div>
                </div>
            `).join('');

            // Microciclo (Idêntico)
            const dias = ["SEGUNDA", "TERÇA", "QUARTA", "QUINTA", "SEXTA", "SÁBADO", "DOMINGO"];
            document.getElementById('micro-grid').innerHTML = dias.map(dia => `
                <div class="min-w-[170px] bg-[#1e293b] rounded-xl border border-white/10 flex flex-col h-[380px]">
                    <div class="bg-blue-900 text-white font-black text-[9px] p-3 text-center border-b border-gold/30">${dia}</div>
                    <div class="p-2 space-y-1 flex-1">
                        ${(micro[dia]?.blocks || []).map(b => `<div class="tag ${b.color} text-center w-full block py-1">${b.label}</span></div>`).join('')}
                    </div>
                </div>
            `).join('');

            // Avisos
            const avisos = JSON.parse(data.pc_notices_list || "[]");
            document.getElementById('avisos-lista').innerHTML = avisos.slice(0,3).map(n=>`<div>• ${n.text}</div>`).join('');
        });
    }

    function votar(idx, nota) {
        const uid = auth.currentUser.uid;
        db.collection('coachData').doc(uid).get().then(doc => {
            const p = JSON.parse(doc.data().pc_players);
            p[idx].rating = nota;
            db.collection('coachData').doc(uid).update({ pc_players: JSON.stringify(p) });
        });
    }

    function showTab(t) {
        document.querySelectorAll('.tab-view').forEach(v => v.classList.add('hidden'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
        document.getElementById('tab-' + t).classList.remove('hidden');
        document.getElementById('btn-' + t).classList.add('nav-active');
    }

    function startVoice() {
        const r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        r.lang = 'pt-BR';
        r.onresult = e => document.getElementById('voice-txt').value += e.results[0][0].transcript + " ";
        r.start();
    }

    function salvarVoz() {
        const txt = document.getElementById('voice-txt').value;
        const uid = auth.currentUser.uid;
        db.collection('coachData').doc(uid).get().then(doc => {
            let list = JSON.parse(doc.data().pc_notices_list || "[]");
            list.unshift({ id: Date.now(), date: new Date().toISOString().split('T')[0], text: "[AUXILIAR]: " + txt });
            db.collection('coachData').doc(uid).update({ pc_notices_list: JSON.stringify(list) });
            alert("Enviado!"); document.getElementById('voice-txt').value = '';
        });
    }
</script>
</body>
</html>
