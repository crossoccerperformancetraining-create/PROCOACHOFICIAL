<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProCoach Auxiliar - V2106 Elite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --navy: #020617; --gold: #d4af37; }
        body { background-color: var(--navy); color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* MENU ESTILO BLOCOS SEPARADOS COM BORDAS */
        .nav-container { @apply flex gap-3 p-4 bg-[#020617] sticky top-[72px] z-40 border-b border-white/10 overflow-x-auto no-scrollbar; }
        .nav-btn { @apply flex-none px-6 py-3.5 text-[11px] font-black text-center rounded-xl uppercase tracking-widest transition-all bg-[#1e293b] text-slate-400 border border-white/10 shadow-sm; }
        .nav-active { @apply border-gold text-gold bg-gold/10 shadow-[0_0_15px_rgba(212,175,55,0.2)] scale-105; }
        
        .dash-card { @apply bg-gradient-to-br from-[#1e293b] to-[#0f172a] rounded-3xl border border-white/10 shadow-2xl overflow-hidden; }
        .tag { @apply px-3 py-1.5 rounded-md text-[9px] font-black text-white uppercase shadow-md; }
        
        .star-rating button { font-size: 22px; color: #334155; transition: 0.2s; drop-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .star-rating button.active { color: #facc15; text-shadow: 0 0 10px rgba(250,204,21,0.5); }

        #loading { position: fixed; inset: 0; background: #020617; color: white; display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 15px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .modal-overlay { background: rgba(2,6,23,0.95); backdrop-filter: blur(8px); }
    </style>
</head>
<body>

<div id="loading">
    <div class="text-4xl font-black italic text-gold animate-pulse drop-shadow-lg">PROCOACH</div>
    <div class="text-[10px] font-bold opacity-50 uppercase tracking-[0.5em]">App Auxiliar</div>
</div>

<div id="auth-screen" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-4 hidden">
    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-slate-900 text-center">
        <h1 class="text-3xl font-black italic mb-2 uppercase">PROCOACH</h1>
        <p class="text-xs font-bold text-blue-600 uppercase mb-8 tracking-widest">Módulo Campo</p>
        <input type="email" id="email" placeholder="E-mail da Nuvem" class="w-full border-b-2 py-3 mb-4 outline-none text-center font-bold text-sm">
        <input type="password" id="pass" placeholder="Senha" class="w-full border-b-2 py-3 mb-8 outline-none text-center font-bold text-sm">
        <button onclick="login()" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl shadow-xl uppercase tracking-widest text-sm active:scale-95 transition-transform">Conectar</button>
    </div>
</div>

<div id="config-modal" class="fixed inset-0 z-[200] modal-overlay flex items-center justify-center p-4 hidden">
    <div class="bg-[#1e293b] p-8 rounded-3xl shadow-2xl w-full max-w-sm border border-white/10">
        <h2 class="text-gold font-black uppercase text-center mb-6 tracking-widest border-b border-white/10 pb-4 text-sm">⚙️ Perfil da Comissão</h2>
        <div class="space-y-5">
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-wider">Seu Nome</label>
                <input type="text" id="staff-name" placeholder="Ex: Silva" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm font-bold text-white outline-none mt-2 focus:border-gold/50 transition-colors">
            </div>
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-wider">Sua Função</label>
                <input type="text" id="staff-role" placeholder="Ex: Massagista" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm font-bold text-gold uppercase outline-none mt-2 focus:border-gold/50 transition-colors">
            </div>
            <button onclick="salvarPerfil()" class="w-full bg-green-600 text-white font-black py-4 rounded-xl shadow-lg mt-6 uppercase tracking-widest text-xs active:scale-95 transition-all">Salvar Perfil</button>
            <button onclick="fecharConfig()" class="w-full bg-transparent text-slate-400 font-bold py-3 rounded-xl text-xs uppercase">Cancelar</button>
        </div>
    </div>
</div>

<div class="bg-gradient-to-b from-[#1e293b] to-[#020617] border-b border-white/10 p-5 flex justify-between items-center sticky top-0 z-50">
    <div class="flex items-center gap-4">
        <div id="team-logo-display" class="w-12 h-12 rounded-full bg-white/5 border border-white/20 flex items-center justify-center overflow-hidden shadow-inner">
            <span class="text-[8px] opacity-30">LOGO</span>
        </div>
        <div>
            <p id="greeting-msg" class="text-[9px] font-black text-gold uppercase tracking-widest mb-1">BOM DIA, COMISSÃO</p>
            <h2 id="team-name-display" class="text-white font-black italic text-xl leading-none uppercase tracking-tighter drop-shadow-md">EQUIPE</h2>
        </div>
    </div>
    <div class="flex flex-col items-end gap-2">
        <button onclick="abrirConfig()" class="text-slate-400 hover:text-white transition-colors bg-white/5 p-2 rounded-full border border-white/10 active:scale-95">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <div class="flex items-center gap-1.5">
            <span class="text-[8px] font-black text-green-400 uppercase tracking-widest">ON</span>
            <div class="w-1.5 h-1.5 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e] animate-pulse"></div>
        </div>
    </div>
</div>

<div class="nav-container">
    <button onclick="showTab('dash')" id="btn-dash" class="nav-btn nav-active">Início</button>
    <button onclick="showTab('sessao')" id="btn-sessao" class="nav-btn">Sessão</button>
    <button onclick="showTab('micro')" id="btn-micro" class="nav-btn">Microciclo</button>
    <button onclick="showTab('voz')" id="btn-voz" class="nav-btn">Relato Voz</button>
</div>

<div id="content" class="p-4 pb-32 space-y-6">
    
    <div id="tab-dash" class="tab-view space-y-5">
        
        <div class="dash-card p-6 border-b-4 border-gold/30">
            <h3 class="text-gold text-[10px] font-black uppercase mb-6 tracking-[0.2em] text-center">🏆 Próximo Adversário</h3>
            <div class="flex flex-col items-center justify-center">
                <div id="adv-logo" class="w-20 h-20 bg-black/40 rounded-2xl border border-white/10 flex items-center justify-center overflow-hidden shadow-2xl mb-4">
                    <span class="text-[10px] opacity-20 italic font-black">ADV</span>
                </div>
                <span id="adv-nome" class="text-2xl font-black italic text-white drop-shadow-lg mb-3 uppercase text-center">A DEFINIR</span>
                <div class="flex gap-2">
                    <span id="jogo-data" class="bg-white/10 px-4 py-1.5 rounded-lg text-[10px] font-black text-gold uppercase tracking-widest border border-white/5 shadow-inner">--/--</span>
                    <span id="jogo-sistema" class="bg-white/10 px-4 py-1.5 rounded-lg text-[10px] font-black text-white/50 uppercase tracking-widest border border-white/5 shadow-inner">SIS: -</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="dash-card p-6">
                <h3 class="text-slate-400 text-[10px] font-black uppercase mb-5 tracking-widest flex items-center gap-2">📅 Agenda Hoje</h3>
                <div id="agenda-hoje" class="space-y-3"></div>
            </div>
            <div class="dash-card p-6 border-l-4 border-yellow-500 bg-yellow-500/5">
                <h3 class="text-yellow-500 text-[10px] font-black uppercase mb-5 tracking-widest flex items-center gap-2">📋 Avisos Oficiais</h3>
                <div id="avisos-lista" class="space-y-3 text-[11px] text-white/80 font-bold leading-relaxed"></div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-3">
            <div class="dash-card p-5 border-b-2 border-gold flex flex-col items-center">
                <h4 class="text-[9px] font-black text-slate-400 uppercase mb-3">⚽ Gols</h4>
                <div id="gols-lista" class="text-[10px] font-black text-gold space-y-1.5 text-center w-full truncate"></div>
            </div>
            <div class="dash-card p-5 border-b-2 border-red-500 flex flex-col items-center">
                <h4 class="text-[9px] font-black text-red-500 uppercase mb-3">🏥 DM</h4>
                <div id="dm-lista" class="text-[10px] font-bold text-red-400 space-y-1.5 text-center w-full truncate"></div>
            </div>
            <div class="dash-card p-5 border-b-2 border-yellow-500 flex flex-col items-center">
                <h4 class="text-[9px] font-black text-yellow-500 uppercase mb-3">⚠️ Susp</h4>
                <div id="susp-lista" class="text-[10px] font-bold text-yellow-400 space-y-1.5 text-center w-full truncate"></div>
            </div>
        </div>
    </div>

    <div id="tab-sessao" class="tab-view hidden space-y-6">
        <div id="drills-lista" class="space-y-6"></div>
        
        <div class="dash-card p-6 bg-gradient-to-t from-[#0f172a] to-[#1e293b]">
            <h3 class="text-gold text-[12px] font-black uppercase mb-6 text-center tracking-[0.3em] border-b border-white/10 pb-4">⭐ Performance do Plantel</h3>
            <div id="players-performance" class="space-y-3"></div>
            
            <button onclick="finalizarTreino()" class="w-full py-6 bg-red-600 hover:bg-red-700 text-white font-black rounded-2xl shadow-[0_10px_20px_rgba(220,38,38,0.3)] active:scale-95 transition-all uppercase tracking-[0.2em] text-xs mt-8">
                🛑 Encerrar Sessão
            </button>
        </div>
    </div>

    <div id="tab-micro" class="tab-view hidden overflow-x-auto pb-8 no-scrollbar">
        <div id="micro-flex" class="flex gap-4 min-w-max"></div>
    </div>

    <div id="tab-voz" class="tab-view hidden space-y-5">
        <div class="dash-card p-6 border-gold/20 border">
            <h3 class="text-gold text-[11px] font-black uppercase mb-6 tracking-widest text-center">🎙️ Gravar Ocorrência</h3>
            <textarea id="voice-txt" class="w-full bg-black/40 text-base h-56 outline-none border border-white/10 rounded-2xl p-5 text-white/90 placeholder-white/30 focus:border-gold/50 transition-colors shadow-inner resize-none" placeholder="Dite problemas ou observações do treino..."></textarea>
        </div>
        <button onclick="iniciarVoz()" class="w-full bg-gradient-to-r from-gold to-yellow-600 text-navy font-black py-6 rounded-2xl shadow-2xl active:scale-95 transition-all text-sm uppercase tracking-widest">
            🎤 Iniciar Gravação
        </button>
        <button onclick="enviarVoz()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl text-[11px] uppercase mt-2 tracking-widest shadow-lg active:scale-95 transition-transform">Salvar na Nuvem</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBURvWmrRe-q-l1h2XKaQepeRQoNcmi7nk", authDomain: "procoachoficial.firebaseapp.com", projectId: "procoachoficial", storageBucket: "procoachoficial.firebasestorage.app", messagingSenderId: "128403842399", appId: "1:128403842399:web:c54259e2b6a5622fb942ea" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Funções de Perfil e Saudação
    function atualizarSaudacao() {
        const hora = new Date().getHours();
        let saudacao = "BOM DIA";
        if (hora >= 12 && hora < 18) saudacao = "BOA TARDE";
        else if (hora >= 18) saudacao = "BOA NOITE";
        
        const role = localStorage.getItem('pc_staff_role') || "Comissão";
        const name = localStorage.getItem('pc_staff_name') || "";
        const textoFull = name ? `${saudacao}, ${role} ${name}` : `${saudacao}, ${role}`;
        
        document.getElementById('greeting-msg').innerText = textoFull;
        document.getElementById('staff-name').value = name;
        document.getElementById('staff-role').value = role;
    }
    
    function abrirConfig() { document.getElementById('config-modal').classList.remove('hidden'); }
    function fecharConfig() { document.getElementById('config-modal').classList.add('hidden'); }
    
    function salvarPerfil() {
        localStorage.setItem('pc_staff_name', document.getElementById('staff-name').value);
        const roleInput = document.getElementById('staff-role').value;
        localStorage.setItem('pc_staff_role', roleInput ? roleInput : "Comissão");
        atualizarSaudacao();
        fecharConfig();
    }

    function login() { auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value); }

    auth.onAuthStateChanged(user => {
        if (user) { 
            document.getElementById('loading').style.display = 'none'; 
            document.getElementById('auth-screen').style.display = 'none'; 
            atualizarSaudacao();
            sync(user.uid); 
        } 
        else { 
            document.getElementById('loading').style.display = 'none'; 
            document.getElementById('auth-screen').style.display = 'flex'; 
        }
    });

    function sync(uid) {
        db.collection('coachData').doc(uid).onSnapshot(doc => {
            if (!doc.exists) return;
            const d = doc.data();
            const todayISO = new Date().toISOString().split('T')[0];
            const todayName = ['DOMINGO','SEGUNDA','TERÇA','QUARTA','QUINTA','SEXTA','SÁBADO'][new Date().getDay()];

            // Cabeçalho Oficial
            if(d.pc_team_name) document.getElementById('team-name-display').innerText = d.pc_team_name;
            if(d.pc_team_logo_url) document.getElementById('team-logo-display').innerHTML = `<img src="${d.pc_team_logo_url}" class="w-full h-full object-contain p-1">`;

            // Adversário Limpo
            if(d.pc_scouting) {
                const s = JSON.parse(d.pc_scouting);
                if(s.opponent) {
                    document.getElementById('adv-nome').innerText = s.opponent;
                    document.getElementById('jogo-data').innerText = s.date ? s.date.split('-').reverse().join('/') : "DATA INDEFINIDA";
                    document.getElementById('jogo-sistema').innerText = "SIS: " + (s.system || "-");
                    if(s.logo) document.getElementById('adv-logo').innerHTML = `<img src="${s.logo}" class="w-full h-full object-contain p-1">`;
                }
            }

            // Agenda e Avisos
            const micro = JSON.parse(d.pc_micro_v7 || "{}");
            const agendaHoje = micro[todayName]?.blocks || [];
            document.getElementById('agenda-hoje').innerHTML = agendaHoje.map(b => `<div class="flex items-center gap-3"><span class="text-[9px] font-black opacity-40 w-10">${b.period}</span><span class="tag ${b.color}">${b.label}</span></div>`).join('') || '<p class="opacity-20 text-[10px] italic">Sem treinos.</p>';
            
            const avisos = JSON.parse(d.pc_notices_list || "[]");
            document.getElementById('avisos-lista').innerHTML = avisos.slice(0,3).map(n => `<p class="border-b border-white/5 pb-2 last:border-0 truncate">➤ ${n.text}</p>`).join('');

            // Performance (Notas e Dados)
            const players = JSON.parse(d.pc_players || "[]");
            document.getElementById('players-performance').innerHTML = players.filter(p=>!p.injured).map((p,i) => `
                <div class="flex items-center justify-between p-3 bg-black/30 rounded-2xl border border-white/5">
                    <div class="flex items-center gap-3">
                        <img src="${p.image || ''}" class="w-10 h-10 rounded-full border border-white/10 shadow-lg object-cover">
                        <span class="text-[11px] font-black uppercase tracking-wide text-white truncate w-24">${p.name}</span>
                    </div>
                    <div class="flex gap-0.5 star-rating">
                        ${[1,2,3,4,5].map(n => `<button onclick="votar(${i}, ${n})" class="${(p.rating||0) >= n ? 'active' : ''}">★</button>`).join('')}
                    </div>
                </div>
            `).join('');

            // Gols/DM/Susp
            document.getElementById('gols-lista').innerHTML = players.sort((a,b)=> (b.stats?.g||0)-(a.stats?.g||0)).slice(0,3).map(p=>`<div class="truncate">${p.name}: ${p.stats?.g||0}</div>`).join('');
            document.getElementById('dm-lista').innerHTML = players.filter(p=>p.injured).map(p=>`<div class="truncate">${p.name}</div>`).join('') || '<span class="opacity-20">Livre</span>';
            document.getElementById('susp-lista').innerHTML = players.filter(p=>p.suspended).map(p=>`<div class="truncate">${p.name}</div>`).join('') || '<span class="opacity-20">Livre</span>';

            // Microciclo Vertical Simplificado
            const dias = ["SEGUNDA", "TERÇA", "QUARTA", "QUINTA", "SEXTA", "SÁBADO", "DOMINGO"];
            document.getElementById('micro-flex').innerHTML = dias.map(dia => `
                <div class="min-w-[160px] bg-[#1e293b] rounded-3xl border border-white/10 flex flex-col shadow-xl overflow-hidden h-[400px]">
                    <div class="bg-blue-900/60 text-white font-black text-[11px] p-4 text-center border-b border-gold/20 uppercase tracking-[0.2em]">${dia}</div>
                    <div class="px-4 py-4 space-y-4 flex-1">
                        <div><p class="text-[8px] font-black text-slate-500 uppercase mb-2">Manhã</p>${(micro[dia]?.blocks || []).filter(x=>x.period==='M').map(x=>`<div class="tag ${x.color} w-full block text-center py-2 mb-1 shadow-md">${x.label}</div>`).join('') || '<span class="text-[10px] opacity-20">-</span>'}</div>
                        <div><p class="text-[8px] font-black text-slate-500 uppercase mb-2">Tarde</p>${(micro[dia]?.blocks || []).filter(x=>x.period==='T').map(x=>`<div class="tag ${x.color} w-full block text-center py-2 mb-1 shadow-md">${x.label}</div>`).join('') || '<span class="text-[10px] opacity-20">-</span>'}</div>
                    </div>
                </div>
            `).join('');

            // Sessão com Cabeçalho Oficial
            const history = JSON.parse(d.pc_history_v2 || "{}");
            const header = JSON.parse(d.pc_header || "{}");
            const sessao = history[todayISO]?.drills || [];
            
            let htmlSessao = `
                <div class="bg-gradient-to-tr from-blue-900 to-navy p-6 rounded-3xl shadow-2xl border-b-4 border-gold/40">
                    <h1 class="text-2xl font-black uppercase mb-5 italic tracking-tighter text-white drop-shadow-md">${d.pc_team_name || 'EQUIPE'}</h1>
                    <div class="grid grid-cols-3 gap-3">
                        <div class="bg-black/30 p-3 rounded-2xl border border-white/5 text-center"><span class="text-[8px] block opacity-40 font-bold uppercase mb-1">DATA</span><b class="text-[10px] uppercase text-white">${todayISO.split('-').reverse().slice(0,2).join('/')}</b></div>
                        <div class="bg-black/30 p-3 rounded-2xl border border-white/5 text-center"><span class="text-[8px] block opacity-40 font-bold uppercase mb-1">LOCAL</span><b class="text-[10px] uppercase text-white">${header.local || "CT"}</b></div>
                        <div class="bg-black/30 p-3 rounded-2xl border border-white/5 text-center"><span class="text-[8px] block opacity-40 font-bold uppercase mb-1">DURAÇÃO</span><b class="text-[10px] uppercase text-gold">${header.dur || "90 min"}</b></div>
                    </div>
                </div>
            `;

            htmlSessao += sessao.map((ex,i) => `
                <div class="dash-card overflow-hidden mt-5">
                    <div class="bg-black/40 p-4 flex justify-between items-center border-b border-white/5">
                        <span class="text-xs font-black text-gold uppercase tracking-widest">${i+1}. ${ex.name}</span>
                        <span class="text-[10px] font-black bg-white/10 px-3 py-1.5 rounded-lg uppercase shadow-inner">${ex.time} min</span>
                    </div>
                    <img src="${ex.image || ''}" class="w-full h-56 object-contain bg-black/60 p-2">
                    ${ex.desc ? `<div class="p-5 text-[11px] text-white/60 italic border-t border-white/5 bg-[#1e293b] leading-relaxed">${ex.desc}</div>` : ''}
                </div>
            `).join('') || '<div class="dash-card p-10 text-center mt-5"><p class="opacity-40 text-xs font-black uppercase tracking-widest">Sem Exercícios</p></div>';
            
            document.getElementById('drills-lista').innerHTML = htmlSessao;
        });
    }

    function votar(idx, nota) {
        const uid = auth.currentUser.uid;
        db.collection('coachData').doc(uid).get().then(doc => {
            const p = JSON.parse(doc.data().pc_players);
            p[idx].rating = nota;
            db.collection('coachData').doc(uid).update({ pc_players: JSON.stringify(p) });
        });
    }

    function finalizarTreino() {
        if(!confirm("Atenção: Deseja encerrar as avaliações e sincronizar com o Professor?")) return;
        const uid = auth.currentUser.uid;
        const staffNome = document.getElementById('staff-name').value || "Membro";
        const staffRole = document.getElementById('staff-role').value || "Comissão";
        db.collection('coachData').doc(uid).get().then(doc => {
            let list = JSON.parse(doc.data().pc_notices_list || "[]");
            list.unshift({ id: Date.now(), date: new Date().toISOString().split('T')[0], text: `🏁 [INFO]: Sessão finalizada por ${staffRole} ${staffNome}.` });
            db.collection('coachData').doc(uid).update({ pc_notices_list: JSON.stringify(list) });
            alert("Sistema Principal Atualizado!");
        });
    }

    function showTab(t) {
        document.querySelectorAll('.tab-view').forEach(v => v.classList.add('hidden'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
        document.getElementById('tab-' + t).classList.remove('hidden');
        document.getElementById('btn-' + t).classList.add('nav-active');
    }

    function iniciarVoz() {
        const r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        r.lang = 'pt-BR';
        r.onresult = e => document.getElementById('voice-txt').value += e.results[0][0].transcript + " ";
        r.start();
    }

    function enviarVoz() {
        const txt = document.getElementById('voice-txt').value;
        if(!txt) return alert("Grave algo primeiro.");
        const uid = auth.currentUser.uid;
        const staffRole = document.getElementById('staff-role').value || "Comissão";
        db.collection('coachData').doc(uid).get().then(doc => {
            let list = JSON.parse(doc.data().pc_notices_list || "[]");
            list.unshift({ id: Date.now(), date: new Date().toISOString().split('T')[0], text: `[${staffRole.toUpperCase()}]: ${txt}` });
            db.collection('coachData').doc(uid).update({ pc_notices_list: JSON.stringify(list) });
            alert("Enviado para o Dashboard Principal!"); 
            document.getElementById('voice-txt').value = '';
        });
    }
</script>
</body>
</html>
