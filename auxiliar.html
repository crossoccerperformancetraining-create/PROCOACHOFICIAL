<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProCoach Auxiliar - V2106 MAX</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --navy: #020617; --gold: #d4af37; }
        body { background-color: var(--navy); color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* MENU ULTRA DESTACADO COM BORDAS E CORES */
        .nav-container { @apply flex gap-3 p-4 bg-[#020617] sticky top-[85px] z-40 border-b-2 border-white/10 overflow-x-auto no-scrollbar; }
        .nav-btn { @apply flex-none px-6 py-4 text-xs font-black text-center rounded-2xl uppercase tracking-widest transition-all bg-[#1e293b] text-slate-400 border-2 border-slate-700 shadow-lg; }
        .nav-active { @apply border-gold text-navy bg-gradient-to-br from-gold to-yellow-500 shadow-[0_10px_25px_rgba(212,175,55,0.4)] scale-105; }
        
        /* CARDS MAIORES E MAIS VÍVIDOS */
        .dash-card { @apply bg-gradient-to-br from-[#1e293b] to-[#0f172a] rounded-3xl border border-white/10 shadow-2xl overflow-hidden; }
        .tag { @apply px-3 py-1.5 rounded-lg text-[10px] font-black text-white uppercase shadow-md; }
        
        /* FILTRO DE POSIÇÕES */
        .filter-btn { @apply px-5 py-3 rounded-xl border border-white/10 text-xs font-black uppercase whitespace-nowrap bg-black/40 text-slate-400 transition-colors shadow-sm; }
        .filter-active { @apply bg-blue-600 text-white border-blue-400 shadow-[0_0_15px_rgba(37,99,235,0.5)]; }

        /* ESTRELAS MAIORES */
        .star-rating button { font-size: 28px; color: #334155; transition: 0.2s; drop-shadow: 0 4px 6px rgba(0,0,0,0.6); }
        .star-rating button.active { color: #facc15; text-shadow: 0 0 15px rgba(250,204,21,0.7); }

        #loading { position: fixed; inset: 0; background: #020617; color: white; display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 15px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .modal-overlay { background: rgba(2,6,23,0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body>

<div id="loading">
    <div class="text-5xl font-black italic text-gold animate-pulse drop-shadow-2xl">PROCOACH</div>
    <div class="text-sm font-bold opacity-50 uppercase tracking-[0.5em] mt-2">Módulo Campo</div>
</div>

<div id="auth-screen" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-4 hidden">
    <div class="bg-white p-10 rounded-[2rem] shadow-2xl w-full max-w-sm text-slate-900 text-center">
        <h1 class="text-4xl font-black italic mb-2 uppercase">PROCOACH</h1>
        <p class="text-xs font-bold text-blue-600 uppercase mb-8 tracking-widest">Acesso da Comissão</p>
        <input type="email" id="email" placeholder="E-mail da Nuvem" class="w-full border-b-2 py-4 mb-4 outline-none text-center font-bold text-base focus:border-gold transition-colors">
        <input type="password" id="pass" placeholder="Senha" class="w-full border-b-2 py-4 mb-8 outline-none text-center font-bold text-base focus:border-gold transition-colors">
        <button onclick="login()" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-2xl uppercase tracking-widest text-sm active:scale-95 transition-transform">Sincronizar App</button>
    </div>
</div>

<div id="config-modal" class="fixed inset-0 z-[200] modal-overlay flex items-center justify-center p-4 hidden">
    <div class="bg-[#1e293b] p-8 rounded-3xl shadow-2xl w-full max-w-sm border-2 border-white/10">
        <h2 class="text-gold font-black uppercase text-center mb-6 tracking-widest border-b border-white/10 pb-4 text-base">⚙️ Identificação</h2>
        <div class="space-y-6">
            <div>
                <label class="text-xs font-black text-slate-400 uppercase tracking-widest">Nome do Profissional</label>
                <input type="text" id="staff-name" placeholder="Ex: Silva" class="w-full bg-black/50 border-2 border-white/10 rounded-2xl p-4 text-base font-bold text-white outline-none mt-2 focus:border-gold/50">
            </div>
            <div>
                <label class="text-xs font-black text-slate-400 uppercase tracking-widest">Sua Função</label>
                <input type="text" id="staff-role" placeholder="Ex: Prep. Físico" class="w-full bg-black/50 border-2 border-white/10 rounded-2xl p-4 text-base font-bold text-gold uppercase outline-none mt-2 focus:border-gold/50">
            </div>
            <button onclick="salvarPerfil()" class="w-full bg-green-600 text-white font-black py-5 rounded-2xl shadow-xl mt-4 uppercase tracking-widest text-sm active:scale-95 transition-all">Salvar Identidade</button>
            <button onclick="fecharConfig()" class="w-full bg-transparent text-slate-400 hover:text-white font-bold py-3 rounded-2xl text-xs uppercase transition-colors">Cancelar</button>
        </div>
    </div>
</div>

<div class="bg-gradient-to-b from-[#1e293b] to-[#020617] border-b border-white/10 p-6 flex justify-between items-center sticky top-0 z-50">
    <div class="flex items-center gap-5">
        <div id="team-logo-display" class="w-16 h-16 rounded-full bg-white/5 border-2 border-white/20 flex items-center justify-center overflow-hidden shadow-2xl"></div>
        <div>
            <p id="greeting-msg" class="text-[11px] font-black text-gold uppercase tracking-widest mb-1">BOM DIA</p>
            <h2 id="team-name-display" class="text-white font-black italic text-2xl md:text-3xl leading-none uppercase tracking-tighter drop-shadow-xl">EQUIPE</h2>
        </div>
    </div>
    <div class="flex flex-col items-end gap-3">
        <button onclick="abrirConfig()" class="bg-black/30 p-3 rounded-full border border-white/20 shadow-lg active:scale-95">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#d4af37" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
    </div>
</div>

<div class="nav-container">
    <button onclick="showTab('dash')" id="btn-dash" class="nav-btn nav-active">📊 Dashboard</button>
    <button onclick="showTab('sessao')" id="btn-sessao" class="nav-btn">⚽ Treino / Notas</button>
    <button onclick="showTab('micro')" id="btn-micro" class="nav-btn">🗓️ Microciclo</button>
    <button onclick="showTab('voz')" id="btn-voz" class="nav-btn">🎙️ Ocorrência</button>
</div>

<div id="content" class="p-5 pb-32 space-y-6">
    
    <div id="tab-dash" class="tab-view space-y-6">
        
        <div class="dash-card p-8 border-b-8 border-gold/40">
            <h3 class="text-gold text-xs font-black uppercase mb-6 tracking-[0.3em] text-center drop-shadow-md">🏆 Próximo Confronto</h3>
            <div class="flex flex-col items-center justify-center">
                <div id="adv-logo" class="w-28 h-28 bg-black/50 rounded-[2rem] border-4 border-white/10 flex items-center justify-center overflow-hidden shadow-2xl mb-5">
                    <span class="text-xs opacity-20 italic font-black">ADV</span>
                </div>
                <span id="adv-nome" class="text-4xl font-black italic text-white drop-shadow-xl mb-4 uppercase text-center tracking-tighter">A DEFINIR</span>
                <div class="flex gap-3">
                    <span id="jogo-data" class="bg-white/10 px-5 py-2 rounded-xl text-xs font-black text-gold uppercase tracking-widest border border-white/5 shadow-inner">--/--</span>
                    <span id="jogo-sistema" class="bg-white/10 px-5 py-2 rounded-xl text-xs font-black text-white/60 uppercase tracking-widest border border-white/5 shadow-inner">SIS: -</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div class="dash-card p-6">
                <h3 class="text-slate-400 text-xs font-black uppercase mb-5 tracking-widest border-b border-white/5 pb-3">📅 Agenda do Dia</h3>
                <div id="agenda-hoje" class="space-y-4"></div>
            </div>
            <div class="dash-card p-6 border-l-8 border-yellow-500 bg-yellow-500/5">
                <h3 class="text-yellow-500 text-xs font-black uppercase mb-5 tracking-widest border-b border-yellow-500/20 pb-3">📋 Quadro de Avisos</h3>
                <div id="avisos-lista" class="space-y-4 text-sm text-white/90 font-bold"></div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-4">
            <div class="dash-card p-5 border-b-4 border-gold text-center"><h4 class="text-[10px] font-black text-slate-400 uppercase mb-3 tracking-widest">⚽ Gols</h4><div id="gols-lista" class="text-xs font-black text-gold space-y-1.5 w-full truncate"></div></div>
            <div class="dash-card p-5 border-b-4 border-red-500 text-center"><h4 class="text-[10px] font-black text-red-500 uppercase mb-3 tracking-widest">🏥 DM</h4><div id="dm-lista" class="text-xs font-black text-red-400 space-y-1.5 w-full truncate"></div></div>
            <div class="dash-card p-5 border-b-4 border-yellow-500 text-center"><h4 class="text-[10px] font-black text-yellow-500 uppercase mb-3 tracking-widest">⚠️ Susp</h4><div id="susp-lista" class="text-xs font-black text-yellow-400 space-y-1.5 w-full truncate"></div></div>
        </div>
    </div>

    <div id="tab-sessao" class="tab-view hidden space-y-6">
        <div id="drills-lista" class="space-y-6"></div>
        
        <div class="dash-card p-6 bg-gradient-to-t from-[#0f172a] to-[#1e293b] border-t-2 border-gold/50">
            <h3 class="text-gold text-sm font-black uppercase mb-5 text-center tracking-[0.3em] drop-shadow-md">⭐ Avaliar Performance</h3>
            
            <div class="flex gap-2 overflow-x-auto no-scrollbar py-2 mb-6" id="pos-filters">
                <button onclick="filtrarPosicao('Todos')" id="f-Todos" class="filter-btn filter-active">Todos</button>
                <button onclick="filtrarPosicao('Goleiro')" id="f-Goleiro" class="filter-btn">Goleiros</button>
                <button onclick="filtrarPosicao('Zagueiro')" id="f-Zagueiro" class="filter-btn">Zagueiros</button>
                <button onclick="filtrarPosicao('Lat. Dir.')" id="f-LatDir" class="filter-btn">Lat Dir.</button>
                <button onclick="filtrarPosicao('Lat. Esq.')" id="f-LatEsq" class="filter-btn">Lat Esq.</button>
                <button onclick="filtrarPosicao('Volante')" id="f-Volante" class="filter-btn">Volantes</button>
                <button onclick="filtrarPosicao('Meia')" id="f-Meia" class="filter-btn">Meias</button>
                <button onclick="filtrarPosicao('Extremo')" id="f-Extremo" class="filter-btn">Extremos</button>
                <button onclick="filtrarPosicao('Atacante')" id="f-Atacante" class="filter-btn">Atacantes</button>
            </div>

            <div id="players-performance" class="space-y-4"></div>
            
            <button onclick="finalizarTreino()" class="w-full py-6 bg-red-600 hover:bg-red-700 text-white font-black rounded-2xl shadow-[0_10px_25px_rgba(220,38,38,0.4)] active:scale-95 transition-all uppercase tracking-[0.2em] text-sm mt-10">
                🛑 Encerrar Sessão
            </button>
        </div>
    </div>

    <div id="tab-micro" class="tab-view hidden overflow-x-auto pb-8 no-scrollbar">
        <div id="micro-flex" class="flex gap-5 min-w-max"></div>
    </div>

    <div id="tab-voz" class="tab-view hidden space-y-6">
        <div class="dash-card p-8 border border-gold/30">
            <h3 class="text-gold text-sm font-black uppercase mb-8 tracking-widest text-center">🎙️ Gravar Ocorrência</h3>
            <textarea id="voice-txt" class="w-full bg-black/50 text-base font-medium h-64 outline-none border border-white/10 rounded-[2rem] p-6 text-white placeholder-white/30 focus:border-gold transition-colors shadow-inner resize-none" placeholder="Relate o que ocorreu no treino..."></textarea>
        </div>
        <button onclick="iniciarVoz()" class="w-full bg-gradient-to-r from-gold to-yellow-500 text-navy font-black py-8 rounded-[2rem] shadow-2xl active:scale-95 transition-all text-base uppercase tracking-widest">
            🎤 Iniciar Gravação
        </button>
        <button onclick="enviarVoz()" class="w-full bg-blue-600 text-white font-black py-6 rounded-[2rem] text-sm uppercase mt-2 tracking-widest shadow-lg active:scale-95 transition-transform">Salvar na Nuvem</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBURvWmrRe-q-l1h2XKaQepeRQoNcmi7nk", authDomain: "procoachoficial.firebaseapp.com", projectId: "procoachoficial", storageBucket: "procoachoficial.firebasestorage.app", messagingSenderId: "128403842399", appId: "1:128403842399:web:c54259e2b6a5622fb942ea" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let allPlayers = []; // Armazena globalmente para o filtro funcionar rápido
    let currentFilter = 'Todos';

    function atualizarSaudacao() {
        const hora = new Date().getHours();
        let s = "BOM DIA";
        if (hora >= 12 && hora < 18) s = "BOA TARDE";
        else if (hora >= 18) s = "BOA NOITE";
        
        const role = localStorage.getItem('pc_staff_role') || "COMISSÃO";
        const name = localStorage.getItem('pc_staff_name') || "";
        document.getElementById('greeting-msg').innerText = `${s}, ${role} ${name}`.toUpperCase();
        document.getElementById('staff-name').value = name;
        document.getElementById('staff-role').value = role;
    }
    
    function abrirConfig() { document.getElementById('config-modal').classList.remove('hidden'); }
    function fecharConfig() { document.getElementById('config-modal').classList.add('hidden'); }
    function salvarPerfil() {
        localStorage.setItem('pc_staff_name', document.getElementById('staff-name').value);
        localStorage.setItem('pc_staff_role', document.getElementById('staff-role').value || "Comissão");
        atualizarSaudacao(); fecharConfig();
    }

    function login() { auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value); }

    auth.onAuthStateChanged(user => {
        if (user) { document.getElementById('loading').style.display = 'none'; document.getElementById('auth-screen').style.display = 'none'; atualizarSaudacao(); sync(user.uid); } 
        else { document.getElementById('loading').style.display = 'none'; document.getElementById('auth-screen').style.display = 'flex'; }
    });

    function sync(uid) {
        db.collection('coachData').doc(uid).onSnapshot(doc => {
            if (!doc.exists) return;
            const d = doc.data();
            const todayISO = new Date().toISOString().split('T')[0];
            const todayName = ['DOMINGO','SEGUNDA','TERÇA','QUARTA','QUINTA','SEXTA','SÁBADO'][new Date().getDay()];

            if(d.pc_team_name) document.getElementById('team-name-display').innerText = d.pc_team_name;
            if(d.pc_team_logo_url) document.getElementById('team-logo-display').innerHTML = `<img src="${d.pc_team_logo_url}" class="w-full h-full object-contain p-1">`;

            if(d.pc_scouting) {
                const s = JSON.parse(d.pc_scouting);
                if(s.opponent) {
                    document.getElementById('adv-nome').innerText = s.opponent;
                    document.getElementById('jogo-data').innerText = s.date ? s.date.split('-').reverse().join('/') : "A DEFINIR";
                    document.getElementById('jogo-sistema').innerText = "SIS: " + (s.system || "-");
                    if(s.logo) document.getElementById('adv-logo').innerHTML = `<img src="${s.logo}" class="w-full h-full object-contain p-2">`;
                }
            }

            const micro = JSON.parse(d.pc_micro_v7 || "{}");
            document.getElementById('agenda-hoje').innerHTML = (micro[todayName]?.blocks || []).map(b => `<div class="flex items-center gap-3"><span class="text-[11px] font-black opacity-40 w-10">${b.period}</span><span class="tag ${b.color} text-xs py-2">${b.label}</span></div>`).join('') || '<p class="opacity-30 text-xs italic font-bold">Livre.</p>';
            
            const avisos = JSON.parse(d.pc_notices_list || "[]");
            document.getElementById('avisos-lista').innerHTML = avisos.slice(0,3).map(n => `<p class="border-b border-white/5 pb-3 last:border-0 truncate">➤ ${n.text}</p>`).join('');

            // PREPARAÇÃO DOS JOGADORES E RENDERIZAÇÃO COM FILTRO
            allPlayers = JSON.parse(d.pc_players || "[]").map((p, i) => ({...p, originalIndex: i}));
            renderPlayers();

            document.getElementById('gols-lista').innerHTML = allPlayers.sort((a,b)=>(b.stats?.g||0)-(a.stats?.g||0)).slice(0,3).map(p=>`<div class="truncate">${p.name}: ${p.stats?.g||0}</div>`).join('');
            document.getElementById('dm-lista').innerHTML = allPlayers.filter(p=>p.injured).map(p=>`<div class="truncate">${p.name}</div>`).join('') || '<span class="opacity-30">Ninguém</span>';
            document.getElementById('susp-lista').innerHTML = allPlayers.filter(p=>p.suspended).map(p=>`<div class="truncate">${p.name}</div>`).join('') || '<span class="opacity-30">Ninguém</span>';

            const dias = ["SEGUNDA", "TERÇA", "QUARTA", "QUINTA", "SEXTA", "SÁBADO", "DOMINGO"];
            document.getElementById('micro-flex').innerHTML = dias.map(dia => `
                <div class="min-w-[180px] bg-[#1e293b] rounded-3xl border border-white/10 flex flex-col shadow-2xl h-auto pb-4">
                    <div class="bg-blue-900/60 text-white font-black text-xs p-5 text-center border-b border-gold/20 uppercase tracking-[0.2em] rounded-t-3xl">${dia}</div>
                    <div class="px-5 py-4 space-y-5">
                        <div><p class="text-[9px] font-black text-slate-500 uppercase mb-3">Manhã</p>${(micro[dia]?.blocks || []).filter(x=>x.period==='M').map(x=>`<div class="tag ${x.color} w-full block text-center py-3 mb-2 shadow-md text-[11px]">${x.label}</div>`).join('') || '<span class="text-xs opacity-20">-</span>'}</div>
                        <div><p class="text-[9px] font-black text-slate-500 uppercase mb-3">Tarde</p>${(micro[dia]?.blocks || []).filter(x=>x.period==='T').map(x=>`<div class="tag ${x.color} w-full block text-center py-3 mb-2 shadow-md text-[11px]">${x.label}</div>`).join('') || '<span class="text-xs opacity-20">-</span>'}</div>
                    </div>
                </div>
            `).join('');

            const history = JSON.parse(d.pc_history_v2 || "{}");
            const sessao = history[todayISO]?.drills || [];
            document.getElementById('drills-lista').innerHTML = sessao.map((ex,i) => `
                <div class="dash-card overflow-hidden">
                    <div class="bg-black/50 p-5 flex justify-between items-center border-b border-white/5">
                        <span class="text-sm font-black text-gold uppercase tracking-widest">${i+1}. ${ex.name}</span>
                        <span class="text-[11px] font-black bg-white/10 px-4 py-2 rounded-lg uppercase">${ex.time} min</span>
                    </div>
                    <img src="${ex.image || ''}" class="w-full h-64 object-contain bg-black/60 p-2">
                    ${ex.desc ? `<div class="p-5 text-xs text-white/70 italic border-t border-white/5 bg-[#1e293b] leading-relaxed">${ex.desc}</div>` : ''}
                </div>
            `).join('') || '<div class="dash-card p-12 text-center"><p class="opacity-40 text-sm font-black uppercase tracking-widest">Sem Exercícios</p></div>';
        });
    }

    // LÓGICA DO FILTRO E RENDERIZAÇÃO DAS ESTRELAS
    function filtrarPosicao(pos) {
        currentFilter = pos;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('filter-active'));
        document.getElementById('f-' + pos.replace(/[^a-zA-Z]/g, '')).classList.add('filter-active');
        renderPlayers();
    }

    function renderPlayers() {
        const f = allPlayers.filter(p => !p.injured && (currentFilter === 'Todos' || p.pos === currentFilter));
        document.getElementById('players-performance').innerHTML = f.map(p => `
            <div class="flex flex-col md:flex-row items-center justify-between p-4 bg-black/30 rounded-2xl border border-white/5 gap-4">
                <div class="flex items-center gap-4 w-full md:w-auto">
                    <img src="${p.image || ''}" class="w-14 h-14 rounded-full border-2 border-white/10 shadow-lg object-cover">
                    <div class="flex flex-col">
                        <span class="text-sm font-black uppercase tracking-wider text-white">${p.name}</span>
                        <span class="text-[10px] font-bold text-gold uppercase opacity-80">${p.pos || 'POSIÇÃO'}</span>
                    </div>
                </div>
                <div class="flex gap-2 star-rating">
                    ${[1,2,3,4,5].map(n => `<button onclick="votar(${p.originalIndex}, ${n})" class="${(p.rating||0) >= n ? 'active' : ''}">★</button>`).join('')}
                </div>
            </div>
        `).join('') || `<p class="text-center text-xs opacity-40 py-6 uppercase font-bold tracking-widest">Nenhum Atleta nesta posição.</p>`;
    }

    function votar(idx, nota) {
        const uid = auth.currentUser.uid;
        db.collection('coachData').doc(uid).get().then(doc => {
            const p = JSON.parse(doc.data().pc_players);
            p[idx].rating = nota;
            db.collection('coachData').doc(uid).update({ pc_players: JSON.stringify(p) });
        });
    }

    function finalizarTreino() {
        if(!confirm("Atenção: Encerrar e sincronizar com a Nuvem?")) return;
        const uid = auth.currentUser.uid;
        const staff = (localStorage.getItem('pc_staff_role')||"Comissão") + " " + (localStorage.getItem('pc_staff_name')||"");
        db.collection('coachData').doc(uid).get().then(doc => {
            let list = JSON.parse(doc.data().pc_notices_list || "[]");
            list.unshift({ id: Date.now(), date: new Date().toISOString().split('T')[0], text: `🏁 [INFO]: Sessão finalizada por ${staff.trim()}.` });
            db.collection('coachData').doc(uid).update({ pc_notices_list: JSON.stringify(list) });
            alert("Sistema Atualizado!");
        });
    }

    function showTab(t) {
        document.querySelectorAll('.tab-view').forEach(v => v.classList.add('hidden'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
        document.getElementById('tab-' + t).classList.remove('hidden');
        document.getElementById('btn-' + t).classList.add('nav-active');
    }

    function iniciarVoz() {
        const r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        r.lang = 'pt-BR';
        r.onresult = e => document.getElementById('voice-txt').value += e.results[0][0].transcript + " ";
        r.start();
    }

    function enviarVoz() {
        const txt = document.getElementById('voice-txt').value;
        if(!txt) return alert("Grave algo primeiro.");
        const uid = auth.currentUser.uid;
        const role = localStorage.getItem('pc_staff_role') || "Comissão";
        db.collection('coachData').doc(uid).get().then(doc => {
            let list = JSON.parse(doc.data().pc_notices_list || "[]");
            list.unshift({ id: Date.now(), date: new Date().toISOString().split('T')[0], text: `[${role.toUpperCase()}]: ${txt}` });
            db.collection('coachData').doc(uid).update({ pc_notices_list: JSON.stringify(list) });
            alert("Enviado para a Nuvem!"); document.getElementById('voice-txt').value = '';
        });
    }
</script>
</body>
</html>
