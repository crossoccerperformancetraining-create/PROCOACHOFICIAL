<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProCoach Auxiliar - V2106 PRO</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --navy: #020617; --gold: #d4af37; --card: #1e293b; }
        body { background-color: var(--navy); color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* BOTÕES DAS ABAS ESTILIZADOS */
        .nav-container { @apply flex gap-2 p-2 bg-slate-900/80 backdrop-blur-md sticky top-[95px] z-40 border-b border-white/5 overflow-x-auto no-scrollbar; }
        .nav-btn { @apply flex-1 px-5 py-3 text-[10px] font-black text-center rounded-xl uppercase tracking-tighter transition-all bg-white/5 text-white/40 border border-white/5 shadow-md; }
        .nav-active { @apply bg-gradient-to-b from-gold to-yellow-600 text-navy border-white/20 shadow-[0_4px_15px_rgba(212,175,55,0.4)]; }
        
        .dash-card { @apply bg-[#1e293b] rounded-2xl border border-white/10 shadow-2xl overflow-hidden; }
        .tag { @apply px-2 py-0.5 rounded text-[9px] font-black text-white uppercase inline-block; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .star-btn { font-size: 18px; color: #334155; transition: 0.2s; }
        .star-btn.active { color: #facc15; }

        #loading { position: fixed; inset: 0; background: #020617; color: white; display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 10px; }
    </style>
</head>
<body>

<div id="loading">
    <div class="text-3xl font-black italic text-gold animate-pulse">PROCOACH AUXILIAR</div>
    <div class="text-[10px] font-bold opacity-30 uppercase tracking-[0.5em]">Sincronizando Nuvem...</div>
</div>

<div id="auth-screen" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-4 hidden">
    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-slate-900 text-center">
        <h1 class="text-2xl font-black italic mb-2 uppercase">PROCOACH</h1>
        <p class="text-[10px] font-bold text-blue-600 uppercase mb-8 tracking-widest">Módulo Comissão</p>
        <input type="email" id="email" placeholder="E-mail" class="w-full border-b-2 py-3 mb-4 outline-none px-2 font-bold">
        <input type="password" id="pass" placeholder="Senha" class="w-full border-b-2 py-3 mb-8 outline-none px-2 font-bold">
        <button onclick="login()" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl shadow-xl uppercase tracking-widest text-xs">Entrar no Campo</button>
    </div>
</div>

<div class="bg-[#020617] border-b border-white/10 p-4 flex justify-between items-center sticky top-0 z-50">
    <div class="flex items-center gap-4">
        <div id="team-logo-display" class="w-14 h-14 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center overflow-hidden shadow-inner"></div>
        <div>
            <h2 id="team-name-display" class="text-white font-black italic text-xl leading-none uppercase tracking-tighter">MINHA EQUIPE</h2>
            <div class="mt-1 flex items-center gap-2">
                <span class="text-[10px] font-bold text-gold uppercase">PROF. ADRIANO CABEÇA</span>
                <span class="w-1 h-1 rounded-full bg-white/20"></span>
                <select class="bg-transparent text-[10px] font-black text-white/40 uppercase border-0 p-0 outline-none">
                    <option>AUXILIAR TÉCNICO</option>
                    <option>PREP. FÍSICO</option>
                    <option>ANALISTA</option>
                </select>
            </div>
        </div>
    </div>
    <div class="w-2.5 h-2.5 rounded-full bg-green-500 shadow-[0_0_12px_#22c55e] animate-pulse"></div>
</div>

<div class="nav-container">
    <button onclick="showTab('dash')" id="btn-dash" class="nav-btn nav-active">Dashboard</button>
    <button onclick="showTab('sessao')" id="btn-sessao" class="nav-btn">Sessão / Check-in</button>
    <button onclick="showTab('micro')" id="btn-micro" class="nav-btn">Microciclo</button>
    <button onclick="showTab('voz')" id="btn-voz" class="nav-btn">Relato Voz</button>
</div>

<div id="content" class="p-3 pb-32 space-y-4">
    
    <div id="tab-dash" class="tab-view space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div class="dash-card p-5">
                <h3 class="text-slate-500 text-[9px] font-black uppercase mb-4 tracking-widest">📅 Agenda do Dia</h3>
                <div id="agenda-hoje" class="space-y-3"></div>
            </div>
            <div class="dash-card p-5 border-l-4 border-yellow-500">
                <h3 class="text-yellow-500 text-[9px] font-black uppercase mb-4 tracking-widest">📋 Quadro de Avisos</h3>
                <div id="avisos-lista" class="space-y-3 text-xs text-white/70 italic font-medium"></div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-2">
            <div class="dash-card p-4 border-b-2 border-gold text-center">
                <h4 class="text-[9px] font-black text-slate-500 uppercase mb-2">⚽ Gols</h4>
                <div id="gols-lista" class="text-[10px] font-bold text-gold"></div>
            </div>
            <div class="dash-card p-4 border-b-2 border-red-500 text-center">
                <h4 class="text-[9px] font-black text-red-500 uppercase mb-2">🏥 DM</h4>
                <div id="dm-lista" class="text-[10px] font-bold text-red-400"></div>
            </div>
            <div class="dash-card p-4 border-b-2 border-yellow-500 text-center">
                <h4 class="text-[9px] font-black text-yellow-500 uppercase mb-2">⚠️ Susp</h4>
                <div id="susp-lista" class="text-[10px] font-bold text-yellow-400"></div>
            </div>
        </div>
    </div>

    <div id="tab-sessao" class="tab-view hidden space-y-5">
        <div id="drills-lista" class="space-y-4"></div>
        <div class="dash-card p-5">
            <h3 class="text-gold text-[10px] font-black uppercase mb-6 text-center tracking-[0.3em]">Performance e Presença</h3>
            <div id="players-performance" class="space-y-3"></div>
            
            <button onclick="finalizarTreino()" class="w-full py-5 bg-red-600 text-white font-black rounded-3xl shadow-lg active:scale-95 transition-all uppercase tracking-widest text-[10px] mt-8 flex justify-center items-center gap-2 border-b-4 border-red-800">
                🛑 ENCERRAR SESSÃO DE TREINO
            </button>
        </div>
    </div>

    <div id="tab-micro" class="tab-view hidden overflow-x-auto pb-8 no-scrollbar">
        <div id="micro-flex" class="flex gap-4 min-w-max"></div>
    </div>

    <div id="tab-voz" class="tab-view hidden space-y-4">
        <div class="dash-card p-6">
            <h3 class="text-gold text-[10px] font-black uppercase mb-6 tracking-widest text-center">Relato Operacional</h3>
            <textarea id="voice-txt" class="w-full bg-black/30 text-sm h-48 outline-none border border-white/5 rounded-2xl p-5 italic" placeholder="O auxiliar dita as intercorrências..."></textarea>
        </div>
        <button onclick="iniciarVoz()" class="w-full bg-gold text-navy font-black py-5 rounded-2xl shadow-xl flex justify-center items-center gap-3 active:scale-95 transition-all text-sm italic uppercase">🎤 Gravar Agora</button>
        <button onclick="enviarVoz()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl text-[10px] uppercase mt-2 tracking-widest">Sincronizar Cloud</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBURvWmrRe-q-l1h2XKaQepeRQoNcmi7nk", authDomain: "procoachoficial.firebaseapp.com", projectId: "procoachoficial", storageBucket: "procoachoficial.firebasestorage.app", messagingSenderId: "128403842399", appId: "1:128403842399:web:c54259e2b6a5622fb942ea" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    function login() { auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value); }

    auth.onAuthStateChanged(user => {
        if (user) { document.getElementById('loading').style.display = 'none'; document.getElementById('auth-screen').style.display = 'none'; sync(user.uid); } 
        else { document.getElementById('loading').style.display = 'none'; document.getElementById('auth-screen').style.display = 'flex'; }
    });

    function sync(uid) {
        db.collection('coachData').doc(uid).onSnapshot(doc => {
            if (!doc.exists) return;
            const d = doc.data();
            const todayISO = new Date().toISOString().split('T')[0];
            const todayName = ['DOMINGO','SEGUNDA','TERÇA','QUARTA','QUINTA','SEXTA','SÁBADO'][new Date().getDay()];

            if(d.pc_team_name) document.getElementById('team-name-display').innerText = d.pc_team_name;
            if(d.pc_team_logo_url) document.getElementById('team-logo-display').innerHTML = `<img src="${d.pc_team_logo_url}" class="w-full h-full object-contain">`;

            const micro = JSON.parse(d.pc_micro_v7 || "{}");
            const agendaHoje = micro[todayName]?.blocks || [];
            document.getElementById('agenda-hoje').innerHTML = agendaHoje.map(b => `<div class="flex items-center gap-3"><span class="text-[9px] font-black opacity-30 w-8">${b.period}</span><span class="tag ${b.color}">${b.label}</span></div>`).join('') || '<p class="opacity-20 text-[10px]">Folga.</p>';

            const avisos = JSON.parse(d.pc_notices_list || "[]");
            document.getElementById('avisos-lista').innerHTML = avisos.slice(0,3).map(n => `<p>• ${n.text}</p>`).join('');

            const players = JSON.parse(d.pc_players || "[]");
            document.getElementById('players-performance').innerHTML = players.filter(p=>!p.injured).map((p,i) => `
                <div class="flex items-center justify-between p-3 bg-white/5 rounded-2xl border border-white/5">
                    <div class="flex items-center gap-3">
                        <img src="${p.image || ''}" class="w-9 h-9 rounded-xl border border-white/10 shadow-lg">
                        <div class="text-left leading-tight"><span class="text-[10px] font-black uppercase block truncate w-24">${p.name}</span>
                        <button onclick="checkin(${i})" class="text-[8px] font-black ${p.present ? 'text-green-500' : 'text-slate-500'} uppercase">${p.present ? '✓ PRESENTE' : '🕒 CHECK-IN'}</button></div>
                    </div>
                    <div class="flex gap-0.5">
                        ${[1,2,3,4,5].map(n => `<button onclick="votar(${i}, ${n})" class="star-btn ${p.rating >= n ? 'active' : ''}">★</button>`).join('')}
                    </div>
                </div>
            `).join('');

            const dias = ["SEGUNDA", "TERÇA", "QUARTA", "QUINTA", "SEXTA", "SÁBADO", "DOMINGO"];
            document.getElementById('micro-flex').innerHTML = dias.map(dia => `
                <div class="min-w-[170px] bg-[#1e293b] rounded-[25px] border border-white/10 flex flex-col h-[380px] shadow-2xl">
                    <div class="bg-blue-900 text-white font-black text-[10px] p-4 text-center border-b border-gold/20 uppercase tracking-widest">${dia}</div>
                    <div class="p-3 space-y-4 flex-1">
                        <div><p class="text-[7px] font-black text-slate-500 uppercase mb-2">Manhã</p>${(micro[dia]?.blocks || []).filter(x=>x.period==='M').map(x=>`<div class="tag ${x.color} w-full block text-center py-2 mb-1 shadow">${x.label}</div>`).join('')}</div>
                        <div><p class="text-[7px] font-black text-slate-500 uppercase mb-2">Tarde</p>${(micro[dia]?.blocks || []).filter(x=>x.period==='T').map(x=>`<div class="tag ${x.color} w-full block text-center py-2 mb-1 shadow">${x.label}</div>`).join('')}</div>
                    </div>
                </div>
            `).join('');

            const history = JSON.parse(d.pc_history_v2 || "{}");
            const sessao = history[todayISO]?.drills || [];
            document.getElementById('drills-lista').innerHTML = sessao.map((ex,i) => `<div class="dash-card"><div class="bg-blue-900/50 p-3 flex justify-between"><span class="text-[10px] font-black text-gold uppercase">${i+1}. ${ex.name}</span></div><img src="${ex.image || ''}" class="w-full h-48 object-contain bg-black/40"></div>`).join('');

            document.getElementById('gols-lista').innerHTML = players.sort((a,b)=> (b.stats?.g||0)-(a.stats?.g||0)).slice(0,3).map(p=>`<div>${p.name}: ${p.stats?.g||0}</div>`).join('');
            document.getElementById('dm-lista').innerHTML = players.filter(p=>p.injured).map(p=>`<div>${p.name}</div>`).join('') || 'Livre';
            document.getElementById('susp-lista').innerHTML = players.filter(p=>p.suspended).map(p=>`<div>${p.name}</div>`).join('') || 'Livre';
        });
    }

    function checkin(idx) {
        const uid = auth.currentUser.uid;
        db.collection('coachData').doc(uid).get().then(doc => {
            const p = JSON.parse(doc.data().pc_players);
            p[idx].present = !p[idx].present;
            db.collection('coachData').doc(uid).update({ pc_players: JSON.stringify(p) });
        });
    }

    function votar(idx, nota) {
        const uid = auth.currentUser.uid;
        db.collection('coachData').doc(uid).get().then(doc => {
            const p = JSON.parse(doc.data().pc_players);
            p[idx].rating = nota;
            db.collection('coachData').doc(uid).update({ pc_players: JSON.stringify(p) });
        });
    }

    function finalizarTreino() {
        if(!confirm("Finalizar avaliações e avisar o Professor?")) return;
        const uid = auth.currentUser.uid;
        db.collection('coachData').doc(uid).get().then(doc => {
            let list = JSON.parse(doc.data().pc_notices_list || "[]");
            list.unshift({ id: Date.now(), date: new Date().toISOString().split('T')[0], text: "🏁 [INFO]: Comissão técnica finalizou o treino." });
            db.collection('coachData').doc(uid).update({ pc_notices_list: JSON.stringify(list) });
            alert("Sincronizado!");
        });
    }

    function showTab(t) {
        document.querySelectorAll('.tab-view').forEach(v => v.classList.add('hidden'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
        document.getElementById('tab-' + t).classList.remove('hidden');
        document.getElementById('btn-' + t).classList.add('nav-active');
    }

    function iniciarVoz() {
        const r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        r.lang = 'pt-BR';
        r.onresult = e => document.getElementById('voice-txt').value += e.results[0][0].transcript + " ";
        r.start();
    }

    function enviarVoz() {
        const txt = document.getElementById('voice-txt').value;
        const uid = auth.currentUser.uid;
        db.collection('coachData').doc(uid).get().then(doc => {
            let list = JSON.parse(doc.data().pc_notices_list || "[]");
            list.unshift({ id: Date.now(), date: new Date().toISOString().split('T')[0], text: "[VOZ CAMPO]: " + txt });
            db.collection('coachData').doc(uid).update({ pc_notices_list: JSON.stringify(list) });
            alert("Sincronizado!"); document.getElementById('voice-txt').value = '';
        });
    }
</script>
</body>
</html>
