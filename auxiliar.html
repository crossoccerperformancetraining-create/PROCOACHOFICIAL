<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProCoach Auxiliar - V2106</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --navy: #001f3f; --gold: #d4af37; }
        body { background-color: #020617; color: white; font-family: 'Inter', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-active { border-bottom: 3px solid var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        .card-atleta { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; }
        .star-rating button { color: #444; font-size: 20px; transition: color 0.2s; }
        .star-rating button.active { color: #d4af37; }
        .micro-row { border-left: 4px solid var(--gold); background: rgba(255,255,255,0.02); }
    </style>
</head>
<body>

<div id="auth-screen" class="fixed inset-0 z-[100] bg-[#001f3f] flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl w-full max-w-sm text-slate-800 shadow-2xl text-center">
        <h1 class="text-2xl font-black italic mb-6">PROCOACH <span class="text-blue-600 text-sm">AUXILIAR</span></h1>
        <input type="email" id="email" placeholder="E-mail" class="w-full border-b-2 p-2 mb-4 outline-none">
        <input type="password" id="pass" placeholder="Senha" class="w-full border-b-2 p-2 mb-6 outline-none">
        <button onclick="login()" class="w-full bg-[#001f3f] text-white font-black py-3 rounded-lg">SINCRONIZAR</button>
    </div>
</div>

<div id="main-app" class="hidden">
    <div class="bg-[#001f3f] border-b border-[#d4af37] p-4 sticky top-0 z-50">
        <div class="flex justify-between items-center mb-4">
            <span class="text-[#d4af37] font-black italic">DASHBOARD CAMPO</span>
            <div id="sync-dot" class="w-2 h-2 rounded-full bg-green-500"></div>
        </div>
        
        <div class="grid grid-cols-2 gap-2 text-[10px] font-bold">
            <div class="bg-white/5 p-2 rounded">
                <p class="text-gold uppercase mb-1 border-b border-gold/20">Manhã</p>
                <div id="agenda-manha" class="flex flex-wrap gap-1"></div>
            </div>
            <div class="bg-white/5 p-2 rounded">
                <p class="text-gold uppercase mb-1 border-b border-gold/20">Tarde</p>
                <div id="agenda-tarde" class="flex flex-wrap gap-1"></div>
            </div>
        </div>
    </div>

    <div class="flex bg-[#001f3f]/95 sticky top-[105px] z-40 border-b border-white/5 overflow-x-auto no-scrollbar">
        <button onclick="tab('elenco')" id="t-elenco" class="flex-none px-6 py-4 text-[10px] font-bold nav-active uppercase">Performance</button>
        <button onclick="tab('sessao')" id="t-sessao" class="flex-none px-6 py-4 text-[10px] font-bold uppercase">Sessão</button>
        <button onclick="tab('micro')" id="t-micro" class="flex-none px-6 py-4 text-[10px] font-bold uppercase">Microciclo</button>
        <button onclick="tab('voz')" id="t-voz" class="flex-none px-6 py-4 text-[10px] font-bold uppercase">Ocorrência</button>
    </div>

    <div class="p-4 pb-24">
        <div id="elenco" class="tab-content active space-y-3">
            <h3 class="text-gold text-[10px] font-black uppercase mb-2">Avaliação Pós-Treino</h3>
            <div id="lista-atletas" class="space-y-2"></div>
        </div>

        <div id="sessao" class="tab-content space-y-4">
            <div id="detalhe-sessao" class="space-y-4"></div>
        </div>

        <div id="micro" class="tab-content space-y-2">
            <div id="grade-micro" class="space-y-2"></div>
        </div>

        <div id="voz" class="tab-content space-y-4">
            <div class="bg-white/5 p-4 rounded-xl border border-white/10">
                <p class="text-gold text-[10px] font-bold uppercase mb-3">Relato de Campo (Voz)</p>
                <textarea id="voice-output" class="w-full bg-transparent text-sm h-32 outline-none" placeholder="Fale as ocorrências..."></textarea>
            </div>
            <button onclick="startVoice()" class="w-full bg-gold text-navy font-black py-4 rounded-xl">🎤 GRAVAR RELATÓRIO</button>
            <button onclick="enviarOcorrencia()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl text-xs uppercase">Sincronizar com PC</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBURvWmrRe-q-l1h2XKaQepeRQoNcmi7nk", authDomain: "procoachoficial.firebaseapp.com", projectId: "procoachoficial", storageBucket: "procoachoficial.firebasestorage.app", messagingSenderId: "128403842399", appId: "1:128403842399:web:c54259e2b6a5622fb942ea" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function login() {
        firebase.auth().signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value);
    }

    firebase.auth().onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            syncApp(user.uid);
        }
    });

    function syncApp(uid) {
        db.collection('coachData').doc(uid).onSnapshot(doc => {
            const data = doc.data() || {};
            const today = new Date().toLocaleDateString('pt-BR', {weekday:'long'}).split('-')[0].charAt(0).toUpperCase() + new Date().toLocaleDateString('pt-BR', {weekday:'long'}).split('-')[0].slice(1);

            // 1. AGENDA DO DIA
            const micro = JSON.parse(data.pc_micro_v7 || "{}");
            const blocosHoje = micro[today]?.blocks || [];
            document.getElementById('agenda-manha').innerHTML = blocosHoje.filter((_,i) => i < 2).map(b => `<span class="px-2 py-0.5 rounded ${b.color}">${b.label}</span>`).join('');
            document.getElementById('agenda-tarde').innerHTML = blocosHoje.filter((_,i) => i >= 2).map(b => `<span class="px-2 py-0.5 rounded ${b.color}">${b.label}</span>`).join('');

            // 2. ATLETAS E ESTRELAS
            if (data.pc_players) {
                const players = JSON.parse(data.pc_players);
                document.getElementById('lista-atletas').innerHTML = players.map((p, i) => `
                    <div class="card-atleta p-3 flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-slate-800 border border-gold/20 overflow-hidden">
                                <img src="${p.image || ''}" class="w-full h-full object-cover">
                            </div>
                            <div>
                                <p class="text-[11px] font-bold uppercase">${p.name}</p>
                                <div class="star-rating" id="stars-${i}">
                                    ${[1,2,3,4,5].map(num => `<button onclick="votar(${i}, ${num})" class="${p.rating >= num ? 'active' : ''}">★</button>`).join('')}
                                </div>
                            </div>
                        </div>
                        <span class="text-[9px] font-bold ${p.injured ? 'text-red-500' : 'text-green-500'}">${p.injured ? 'DM' : 'OK'}</span>
                    </div>
                `).join('');
            }

            // 3. SESSÃO DE TREINO
            const history = JSON.parse(data.pc_history_v2 || "{}");
            const dateKey = new Date().toISOString().split('T')[0];
            const sessao = history[dateKey]?.drills || [];
            document.getElementById('detalhe-sessao').innerHTML = sessao.map(d => `
                <div class="bg-white/5 rounded-xl p-3 border border-white/5">
                    <p class="text-gold font-bold text-xs uppercase mb-2">${d.name}</p>
                    <img src="${d.image || ''}" class="w-full rounded-lg mb-2">
                    <p class="text-[10px] opacity-60">${d.desc}</p>
                </div>
            `).join('') || '<p class="text-center opacity-30 text-xs">Sem treino para hoje</p>';

            // 4. MICROCICLO (SEG A DOM)
            const diasSemana = ["Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado", "Domingo"];
            document.getElementById('grade-micro').innerHTML = diasSemana.map(d => `
                <div class="micro-row p-3 flex justify-between items-center rounded-r">
                    <span class="text-[10px] font-black uppercase">${d}</span>
                    <div class="flex gap-1">
                        ${(micro[d]?.blocks || []).map(b => `<span class="px-2 py-1 rounded text-[8px] font-bold ${b.color}">${b.label}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        });
    }

    function votar(idx, nota) {
        const uid = firebase.auth().currentUser.uid;
        db.collection('coachData').doc(uid).get().then(doc => {
            const players = JSON.parse(doc.data().pc_players);
            players[idx].rating = nota;
            db.collection('coachData').doc(uid).update({ pc_players: JSON.stringify(players) });
        });
    }

    function tab(n) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('button[id^="t-"]').forEach(b => b.classList.remove('nav-active'));
        document.getElementById(n).classList.add('active');
        document.getElementById('t-' + n).classList.add('nav-active');
    }

    function startVoice() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'pt-BR';
        rec.onresult = e => document.getElementById('voice-output').value += e.results[0][0].transcript + " ";
        rec.start();
    }
</script>
</body>
</html>
