<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProCoach Auxiliar - Elite Field</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --navy: #020617; --gold: #d4af37; --card-bg: #1e293b; }
        body { background-color: var(--navy); color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Menu Moderno (Pílulas com Bordas) */
        .nav-container { @apply flex gap-3 p-3 bg-[#020617]/90 backdrop-blur-xl sticky top-[72px] z-40 border-b border-white/5 overflow-x-auto no-scrollbar; }
        .nav-btn { @apply flex-none px-6 py-3 text-xs font-black text-center rounded-full uppercase tracking-widest transition-all bg-slate-800 text-slate-400 border-2 border-transparent shadow-lg; }
        .nav-active { @apply border-gold text-gold bg-gold/10 shadow-[0_0_20px_rgba(212,175,55,0.3)] scale-105; }
        
        /* Cards Premium com Ícones */
        .dash-card { @apply bg-gradient-to-br from-[#1e293b] to-[#0f172a] rounded-3xl border border-white/10 shadow-2xl overflow-hidden; }
        .tag { @apply px-3 py-1 rounded-md text-[10px] font-black text-white uppercase shadow-md; }
        
        /* Fontes maiores e leitura clara */
        .player-name { @apply text-xs font-black uppercase tracking-wide text-white; }
        .star-rating button { font-size: 24px; color: #334155; transition: 0.2s; drop-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .star-rating button.active { color: #facc15; text-shadow: 0 0 12px rgba(250,204,21,0.6); }

        #loading { position: fixed; inset: 0; background: #020617; color: white; display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 15px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div id="loading">
    <div class="text-4xl font-black italic text-gold animate-pulse drop-shadow-lg">PROCOACH</div>
    <div class="text-xs font-bold opacity-50 uppercase tracking-[0.5em]">App Auxiliar</div>
</div>

<div id="auth-screen" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-4 hidden">
    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-slate-900 text-center">
        <h1 class="text-3xl font-black italic mb-2 uppercase">PROCOACH</h1>
        <p class="text-xs font-bold text-blue-600 uppercase mb-8 tracking-widest">Módulo Campo</p>
        <input type="email" id="email" placeholder="E-mail" class="w-full border-b-2 py-3 mb-4 outline-none text-center font-bold text-sm">
        <input type="password" id="pass" placeholder="Senha" class="w-full border-b-2 py-3 mb-8 outline-none text-center font-bold text-sm">
        <button onclick="login()" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl shadow-xl uppercase tracking-widest text-sm active:scale-95 transition-transform">Entrar</button>
    </div>
</div>

<div class="bg-gradient-to-b from-[#1e293b] to-[#020617] border-b border-white/10 p-5 flex justify-between items-center sticky top-0 z-50">
    <div class="flex items-center gap-4">
        <div id="team-logo-display" class="w-12 h-12 rounded-full bg-white/5 border border-white/20 flex items-center justify-center overflow-hidden shadow-inner">
            <span class="text-[8px] opacity-30">LOGO</span>
        </div>
        <h2 id="team-name-display" class="text-white font-black italic text-2xl leading-none uppercase tracking-tighter drop-shadow-md">EQUIPE</h2>
    </div>
    <div class="flex flex-col items-end">
        <div class="flex items-center gap-2 mb-1">
            <span class="text-[9px] font-black text-green-400 uppercase tracking-widest">Online</span>
            <div class="w-2.5 h-2.5 rounded-full bg-green-500 shadow-[0_0_12px_#22c55e] animate-pulse"></div>
        </div>
    </div>
</div>

<div class="nav-container">
    <button onclick="showTab('dash')" id="btn-dash" class="nav-btn nav-active">📱 Início</button>
    <button onclick="showTab('sessao')" id="btn-sessao" class="nav-btn">⚽ Sessão</button>
    <button onclick="showTab('micro')" id="btn-micro" class="nav-btn">🗓️ Micro</button>
    <button onclick="showTab('voz')" id="btn-voz" class="nav-btn">🎙️ Relato</button>
</div>

<div id="content" class="p-4 pb-32 space-y-6">
    
    <div id="tab-dash" class="tab-view space-y-5">
        
        <div class="dash-card p-5 border-l-4 border-blue-500 bg-blue-900/10">
            <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-3">Identificação da Comissão</p>
            <div class="flex gap-3">
                <input type="text" id="staff-name" placeholder="Seu Nome..." class="bg-black/30 border border-white/10 rounded-lg p-3 text-sm font-bold text-white w-full outline-none focus:border-blue-500 transition-colors" onchange="salvarPerfil()">
                <select id="staff-role" class="bg-black/30 border border-white/10 rounded-lg p-3 text-sm font-bold text-gold uppercase outline-none focus:border-blue-500 w-full" onchange="salvarPerfil()">
                    <option value="Auxiliar Técnico">Auxiliar Técnico</option>
                    <option value="Prep. Físico">Prep. Físico</option>
                    <option value="Treinador de Goleiros">Treinador de Goleiros</option>
                    <option value="Analista">Analista</option>
                    <option value="Fisioterapeuta">Fisioterapeuta</option>
                    <option value="Roupeiro">Roupeiro</option>
                </select>
            </div>
        </div>

        <div class="dash-card p-6 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-slate-800 via-[#1e293b] to-navy">
            <h3 class="text-gold text-[11px] font-black uppercase mb-6 tracking-[0.2em] text-center">🏆 Próximo Confronto</h3>
            <div class="flex justify-between items-center px-4">
                <div class="flex flex-col items-center gap-2">
                    <div id="nosso-escudo" class="w-16 h-16 rounded-full bg-black/40 border-2 border-white/10 overflow-hidden shadow-xl"></div>
                    <span class="text-[10px] font-bold uppercase opacity-50">Nós</span>
                </div>
                <div class="text-center flex flex-col items-center">
                    <span class="text-3xl font-black italic text-white drop-shadow-lg mb-1">VS</span>
                    <span id="jogo-data" class="bg-white/10 px-3 py-1 rounded-full text-[10px] font-black text-gold uppercase tracking-widest border border-white/5">DATA A DEFINIR</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div id="adv-logo" class="w-16 h-16 rounded-full bg-black/40 border-2 border-white/10 overflow-hidden shadow-xl flex items-center justify-center text-[8px] italic opacity-50">ADV</div>
                    <span id="adv-nome" class="text-[10px] font-bold uppercase opacity-80 truncate w-20 text-center">Adversário</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="dash-card p-5">
                <h3 class="text-slate-400 text-[11px] font-black uppercase mb-4 tracking-widest flex items-center gap-2">📅 Agenda de Hoje</h3>
                <div id="agenda-hoje" class="space-y-3"></div>
            </div>
            <div class="dash-card p-5 border-t-4 border-yellow-500 bg-yellow-500/5">
                <h3 class="text-yellow-500 text-[11px] font-black uppercase mb-4 tracking-widest flex items-center gap-2">📋 Mural de Avisos</h3>
                <div id="avisos-lista" class="space-y-3 text-sm text-white/80 font-medium"></div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-3">
            <div class="dash-card p-4 border-b-4 border-gold flex flex-col items-center justify-center">
                <h4 class="text-[10px] font-black text-slate-400 uppercase mb-3">⚽ Gols</h4>
                <div id="gols-lista" class="text-xs font-black text-gold space-y-1 text-center"></div>
            </div>
            <div class="dash-card p-4 border-b-4 border-red-500 flex flex-col items-center justify-center">
                <h4 class="text-[10px] font-black text-red-500 uppercase mb-3">🏥 DM</h4>
                <div id="dm-lista" class="text-[11px] font-bold text-red-400 space-y-1 text-center"></div>
            </div>
            <div class="dash-card p-4 border-b-4 border-yellow-500 flex flex-col items-center justify-center">
                <h4 class="text-[10px] font-black text-yellow-500 uppercase mb-3">⚠️ Susp</h4>
                <div id="susp-lista" class="text-[11px] font-bold text-yellow-400 space-y-1 text-center"></div>
            </div>
        </div>
    </div>

    <div id="tab-sessao" class="tab-view hidden space-y-6">
        <div id="drills-lista" class="space-y-5"></div>
        
        <div class="dash-card p-6 bg-gradient-to-t from-[#0f172a] to-[#1e293b]">
            <h3 class="text-gold text-[12px] font-black uppercase mb-6 text-center tracking-[0.3em] drop-shadow-md border-b border-white/10 pb-4">⭐ Avaliação de Performance</h3>
            <div id="players-performance" class="space-y-3"></div>
            
            <button onclick="finalizarTreino()" class="w-full py-6 bg-red-600 hover:bg-red-700 text-white font-black rounded-2xl shadow-[0_10px_20px_rgba(220,38,38,0.3)] active:scale-95 transition-all uppercase tracking-[0.2em] text-xs mt-8 flex justify-center items-center gap-3">
                <span class="text-xl">🛑</span> ENCERRAR SESSÃO NO SISTEMA
            </button>
        </div>
    </div>

    <div id="tab-micro" class="tab-view hidden overflow-x-auto pb-8 no-scrollbar">
        <div id="micro-flex" class="flex gap-4 min-w-max"></div>
    </div>

    <div id="tab-voz" class="tab-view hidden space-y-5">
        <div class="dash-card p-6 border-gold/20 border">
            <h3 class="text-gold text-xs font-black uppercase mb-6 tracking-widest text-center">🎙️ Relato Operacional</h3>
            <textarea id="voice-txt" class="w-full bg-black/40 text-base h-56 outline-none border border-white/10 rounded-2xl p-5 text-white/90 placeholder-white/30 focus:border-gold/50 transition-colors shadow-inner resize-none" placeholder="Dite aqui os atrasos, lesões ou observações do treino para o Professor..."></textarea>
        </div>
        <button onclick="iniciarVoz()" class="w-full bg-gradient-to-r from-gold to-yellow-600 text-navy font-black py-6 rounded-2xl shadow-xl flex justify-center items-center gap-3 active:scale-95 transition-all text-sm uppercase tracking-widest">
            <span class="text-2xl">🎤</span> Iniciar Gravação
        </button>
        <button onclick="enviarVoz()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl text-xs uppercase mt-2 tracking-widest shadow-lg active:scale-95 transition-transform">Salvar na Nuvem</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBURvWmrRe-q-l1h2XKaQepeRQoNcmi7nk", authDomain: "procoachoficial.firebaseapp.com", projectId: "procoachoficial", storageBucket: "procoachoficial.firebasestorage.app", messagingSenderId: "128403842399", appId: "1:128403842399:web:c54259e2b6a5622fb942ea" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Carregar Perfil Salvo Localmente
    document.getElementById('staff-name').value = localStorage.getItem('pc_staff_name') || '';
    document.getElementById('staff-role').value = localStorage.getItem('pc_staff_role') || 'Auxiliar Técnico';

    function salvarPerfil() {
        localStorage.setItem('pc_staff_name', document.getElementById('staff-name').value);
        localStorage.setItem('pc_staff_role', document.getElementById('staff-role').value);
    }

    function login() { auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value); }

    auth.onAuthStateChanged(user => {
        if (user) { document.getElementById('loading').style.display = 'none'; document.getElementById('auth-screen').style.display = 'none'; sync(user.uid); } 
        else { document.getElementById('loading').style.display = 'none'; document.getElementById('auth-screen').style.display = 'flex'; }
    });

    function sync(uid) {
        db.collection('coachData').doc(uid).onSnapshot(doc => {
            if (!doc.exists) return;
            const d = doc.data();
            const todayISO = new Date().toISOString().split('T')[0];
            const todayName = ['DOMINGO','SEGUNDA','TERÇA','QUARTA','QUINTA','SEXTA','SÁBADO'][new Date().getDay()];

            // Identidade
            if(d.pc_team_name) document.getElementById('team-name-display').innerText = d.pc_team_name;
            if(d.pc_team_logo_url) {
                document.getElementById('team-logo-display').innerHTML = `<img src="${d.pc_team_logo_url}" class="w-full h-full object-contain p-1">`;
                document.getElementById('nosso-escudo').innerHTML = `<img src="${d.pc_team_logo_url}" class="w-full h-full object-contain p-2">`;
            }

            // Próximo Adversário
            if(d.pc_scouting) {
                const s = JSON.parse(d.pc_scouting);
                if(s.opponent) {
                    document.getElementById('adv-nome').innerText = s.opponent;
                    document.getElementById('jogo-data').innerText = s.date ? s.date.split('-').reverse().join('/') : "A DEFINIR";
                    if(s.logo) document.getElementById('adv-logo').innerHTML = `<img src="${s.logo}" class="w-full h-full object-contain p-2">`;
                }
            }

            // Agenda Dashboard
            const micro = JSON.parse(d.pc_micro_v7 || "{}");
            const agendaHoje = micro[todayName]?.blocks || [];
            document.getElementById('agenda-hoje').innerHTML = agendaHoje.map(b => `<div class="flex items-center gap-3"><span class="text-[10px] font-black opacity-40 w-10">${b.period}</span><span class="tag ${b.color}">${b.label}</span></div>`).join('') || '<p class="opacity-30 text-xs italic font-bold">Sem atividades.</p>';

            // Avisos
            const avisos = JSON.parse(d.pc_notices_list || "[]");
            document.getElementById('avisos-lista').innerHTML = avisos.slice(0,3).map(n => `<p class="border-b border-white/5 pb-2 last:border-0">➤ ${n.text}</p>`).join('');

            // Atletas Gols/DM/Susp
            const players = JSON.parse(d.pc_players || "[]");
            document.getElementById('gols-lista').innerHTML = players.sort((a,b)=> (b.stats?.g||0)-(a.stats?.g||0)).slice(0,3).map(p=>`<div>${p.name}: ${p.stats?.g||0}</div>`).join('');
            document.getElementById('dm-lista').innerHTML = players.filter(p=>p.injured).map(p=>`<div>${p.name}</div>`).join('') || '<span class="opacity-30">Nenhum</span>';
            document.getElementById('susp-lista').innerHTML = players.filter(p=>p.suspended).map(p=>`<div>${p.name}</div>`).join('') || '<span class="opacity-30">Nenhum</span>';

            // Notas de Sessão
            document.getElementById('players-performance').innerHTML = players.filter(p=>!p.injured).map((p,i) => `
                <div class="flex items-center justify-between p-4 bg-black/30 rounded-2xl border border-white/5 shadow-inner">
                    <div class="flex items-center gap-4">
                        <img src="${p.image || ''}" class="w-10 h-10 rounded-full border-2 border-white/10 shadow-lg object-cover">
                        <span class="player-name truncate w-24">${p.name}</span>
                    </div>
                    <div class="flex gap-1 star-rating">
                        ${[1,2,3,4,5].map(n => `<button onclick="votar(${i}, ${n})" class="${(p.rating||0) >= n ? 'active' : ''}">★</button>`).join('')}
                    </div>
                </div>
            `).join('');

            // Microciclo Vertical Simplificado
            const dias = ["SEGUNDA", "TERÇA", "QUARTA", "QUINTA", "SEXTA", "SÁBADO", "DOMINGO"];
            document.getElementById('micro-flex').innerHTML = dias.map(dia => `
                <div class="min-w-[180px] bg-[#1e293b] rounded-3xl border border-white/10 flex flex-col h-auto shadow-2xl overflow-hidden pb-4">
                    <div class="bg-blue-900/60 text-white font-black text-[11px] p-4 text-center border-b border-gold/20 uppercase tracking-[0.2em] mb-2">${dia}</div>
                    <div class="px-4 py-2 space-y-4">
                        <div><p class="text-[9px] font-black text-slate-500 uppercase mb-2">Manhã</p>${(micro[dia]?.blocks || []).filter(x=>x.period==='M').map(x=>`<div class="tag ${x.color} w-full block text-center py-2.5 mb-1.5 shadow-md text-[10px]">${x.label}</div>`).join('') || '<span class="text-[10px] opacity-30">-</span>'}</div>
                        <div><p class="text-[9px] font-black text-slate-500 uppercase mb-2">Tarde</p>${(micro[dia]?.blocks || []).filter(x=>x.period==='T').map(x=>`<div class="tag ${x.color} w-full block text-center py-2.5 mb-1.5 shadow-md text-[10px]">${x.label}</div>`).join('') || '<span class="text-[10px] opacity-30">-</span>'}</div>
                    </div>
                </div>
            `).join('');

            // Exercícios do Dia
            const history = JSON.parse(d.pc_history_v2 || "{}");
            const sessao = history[todayISO]?.drills || [];
            document.getElementById('drills-lista').innerHTML = sessao.map((ex,i) => `
                <div class="dash-card overflow-hidden border-t-4 border-t-blue-500">
                    <div class="bg-black/30 p-4 flex justify-between items-center border-b border-white/5">
                        <span class="text-sm font-black text-gold uppercase tracking-wide">${i+1}. ${ex.name}</span>
                        <span class="text-[10px] font-black bg-white/10 px-3 py-1 rounded-full uppercase">${ex.time} min</span>
                    </div>
                    <img src="${ex.image || ''}" class="w-full h-56 object-contain bg-black/50 p-2">
                    ${ex.desc ? `<div class="p-4 text-xs text-white/70 italic border-t border-white/5 bg-[#1e293b] leading-relaxed">${ex.desc}</div>` : ''}
                </div>
            `).join('') || '<div class="dash-card p-10 text-center"><span class="text-4xl block mb-2">⚽</span><p class="opacity-50 text-sm font-bold uppercase tracking-widest">Nenhum Exercício Carregado</p></div>';
        });
    }

    function votar(idx, nota) {
        const uid = auth.currentUser.uid;
        db.collection('coachData').doc(uid).get().then(doc => {
            const p = JSON.parse(doc.data().pc_players);
            p[idx].rating = nota;
            db.collection('coachData').doc(uid).update({ pc_players: JSON.stringify(p) });
        });
    }

    function finalizarTreino() {
        if(!confirm("Atenção: Deseja encerrar as avaliações e sincronizar com o Professor?")) return;
        const uid = auth.currentUser.uid;
        const staffNome = document.getElementById('staff-name').value || "Comissão Técnica";
        db.collection('coachData').doc(uid).get().then(doc => {
            let list = JSON.parse(doc.data().pc_notices_list || "[]");
            list.unshift({ id: Date.now(), date: new Date().toISOString().split('T')[0], text: `🏁 [INFO]: Sessão finalizada por ${staffNome}.` });
            db.collection('coachData').doc(uid).update({ pc_notices_list: JSON.stringify(list) });
            alert("Sistema Principal Atualizado!");
        });
    }

    function showTab(t) {
        document.querySelectorAll('.tab-view').forEach(v => v.classList.add('hidden'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
        document.getElementById('tab-' + t).classList.remove('hidden');
        document.getElementById('btn-' + t).classList.add('nav-active');
    }

    function iniciarVoz() {
        const r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        r.lang = 'pt-BR';
        r.onresult = e => document.getElementById('voice-txt').value += e.results[0][0].transcript + " ";
        r.start();
    }

    function enviarVoz() {
        const txt = document.getElementById('voice-txt').value;
        if(!txt) return alert("Grave algo primeiro.");
        const uid = auth.currentUser.uid;
        const staffRole = document.getElementById('staff-role').value || "Comissão";
        db.collection('coachData').doc(uid).get().then(doc => {
            let list = JSON.parse(doc.data().pc_notices_list || "[]");
            list.unshift({ id: Date.now(), date: new Date().toISOString().split('T')[0], text: `[${staffRole.toUpperCase()}]: ${txt}` });
            db.collection('coachData').doc(uid).update({ pc_notices_list: JSON.stringify(list) });
            alert("Ocorrência enviada para o Professor!"); 
            document.getElementById('voice-txt').value = '';
        });
    }
</script>
</body>
</html>
