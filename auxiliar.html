<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProCoach Auxiliar - V2106 Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --navy: #001f3f; --gold: #d4af37; }
        body { background-color: #020617; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-active { border-bottom: 3px solid var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        .card-status { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .badge { font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="bg-[#001f3f] border-b border-[#d4af37] p-4 flex justify-between items-center sticky top-0 z-50 shadow-lg">
    <div>
        <h1 class="text-[#d4af37] font-black italic text-lg leading-none">PROCOACH AUXILIAR</h1>
        <p class="text-[9px] text-white/50 tracking-widest uppercase mt-1">Sincronizado: V2106 MAX</p>
    </div>
    <div id="sync-indicator" class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
</div>

<div class="flex bg-[#001f3f]/95 backdrop-blur-md sticky top-[62px] z-40 border-b border-white/5">
    <button onclick="tab('status')" id="t-status" class="flex-1 py-4 text-[10px] font-bold nav-active">ELENCO</button>
    <button onclick="tab('sessao')" id="t-sessao" class="flex-1 py-4 text-[10px] font-bold">SESSÃO</button>
    <button onclick="tab('agenda')" id="t-agenda" class="flex-1 py-4 text-[10px] font-bold">AGENDA</button>
    <button onclick="tab('ocorrencia')" id="t-ocorrencia" class="flex-1 py-4 text-[10px] font-bold">VOZ/REC</button>
</div>

<div class="p-4 pb-24">

    <div id="status" class="tab-content active space-y-2">
        <h3 class="text-[#d4af37] text-xs font-bold uppercase mb-4">Status do Plantel em Tempo Real</h3>
        <div id="lista-atletas" class="space-y-2">
            <p class="text-xs text-white/40 italic">Carregando atletas do V2106...</p>
        </div>
    </div>

    <div id="sessao" class="tab-content space-y-4">
        <h3 class="text-[#d4af37] text-xs font-bold uppercase mb-4">Treino do Dia</h3>
        <div id="container-sessao" class="space-y-4">
            <p class="text-xs text-white/40 italic">Nenhum treino planejado para hoje no V2106.</p>
        </div>
    </div>

    <div id="agenda" class="tab-content space-y-4">
        <div class="bg-gold/10 border border-gold/30 p-4 rounded-xl">
            <h4 class="text-gold font-bold text-[10px] uppercase mb-3 tracking-widest">Quadro de Avisos</h4>
            <div class="space-y-3" id="lista-avisos">
                <p class="text-[11px] text-white/40">Sem avisos recentes.</p>
            </div>
        </div>
    </div>

    <div id="ocorrencia" class="tab-content space-y-4">
        <h3 class="text-gold font-bold text-xs uppercase">Relatar Ocorrência via Voz</h3>
        <textarea id="voice-output" class="w-full bg-white/5 border border-gold/20 rounded-xl p-4 text-sm h-40 focus:border-gold outline-none" placeholder="O auxiliar dita aqui lesões, atrasos ou problemas técnicos..."></textarea>
        <button onclick="startVoice()" class="w-full bg-gold text-navy font-black py-5 rounded-full shadow-xl active:scale-95 transition-all flex justify-center items-center gap-2">
            <span>🎤</span> INICIAR GRAVAÇÃO
        </button>
        <button onclick="salvarOcorrencia()" class="w-full bg-green-600 text-white font-bold py-3 rounded-xl text-xs uppercase mt-4">Enviar para o Professor</button>
    </div>

</div>

<script>
    // CONFIGURAÇÃO FIREBASE - SUBSTITUA COM SEUS DADOS REAIS PARA ATIVAR
    const firebaseConfig = {
        apiKey: "AIzaSyBURvWmrRe-q-l1h2XKaQepeRQoNcmi7nk",
        authDomain: "procoachoficial.firebaseapp.com",
        projectId: "procoachoficial",
        storageBucket: "procoachoficial.appspot.com",
        messagingSenderId: "128403842399",
        appId: "1:128403842399:web:c54259e2b6a5622fb942ea"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 1. CARREGAR ATLETAS E STATUS
    function syncAtletas() {
        db.collection('pc_players').onSnapshot((snapshot) => {
            const container = document.getElementById('lista-atletas');
            container.innerHTML = '';
            document.getElementById('sync-indicator').classList.replace('bg-red-500', 'bg-green-500');

            snapshot.forEach((doc) => {
                const p = doc.data();
                const statusColor = p.injured ? 'bg-red-600' : (p.suspended ? 'bg-yellow-500 text-black' : 'bg-green-600');
                const statusLabel = p.injured ? 'DM' : (p.suspended ? 'SUSPENSO' : 'DISPONÍVEL');

                container.innerHTML += `
                    <div class="card-status p-3 rounded-xl flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full border border-gold bg-slate-800 overflow-hidden">
                            ${p.image ? `<img src="${p.image}" class="w-full h-full object-cover">` : ''}
                        </div>
                        <div class="flex-1">
                            <p class="text-[11px] font-bold uppercase">${p.name}</p>
                            <span class="badge ${statusColor}">${statusLabel}</span>
                        </div>
                        <div class="text-[9px] font-bold text-gold">${p.pos || ''}</div>
                    </div>
                `;
            });
        });
    }

    // 2. CARREGAR AVISOS
    function syncAvisos() {
        db.collection('pc_notices_list').orderBy('date', 'desc').limit(5).onSnapshot((snapshot) => {
            const container = document.getElementById('lista-avisos');
            container.innerHTML = '';
            snapshot.forEach((doc) => {
                const n = doc.data();
                container.innerHTML += `<p class="border-b border-white/5 pb-2 text-[11px]"><strong>${n.date}:</strong> ${n.text}</p>`;
            });
        });
    }

    // VOZ PARA TEXTO
    function startVoice() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'pt-BR';
        recognition.onresult = (event) => {
            document.getElementById('voice-output').value += event.results[0][0].transcript + " ";
        };
        recognition.start();
    }

    // SALVAR OCORRÊNCIA NO FIREBASE
    function salvarOcorrencia() {
        const text = document.getElementById('voice-output').value;
        if(!text) return alert("Dite algo primeiro!");

        db.collection('pc_notices_list').add({
            text: "[AUXILIAR]: " + text,
            date: new Date().toISOString().split('T')[0],
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
            alert("Enviado com sucesso!");
            document.getElementById('voice-output').value = '';
        });
    }

    function tab(name) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('button[id^="t-"]').forEach(b => b.classList.remove('nav-active'));
        document.getElementById(name).classList.add('active');
        document.getElementById('t-' + name).classList.add('nav-active');
    }

    // Iniciar Sincronização
    syncAtletas();
    syncAvisos();
</script>

</body>
</html>
